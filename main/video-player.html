<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' cc-media: file: blob: data: https:; media-src * cc-media: file: blob: data:; img-src * cc-media: file: blob: data: https: http:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>Видео</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #fff; }
  body { display: flex; align-items: center; justify-content: center; user-select: none; -webkit-app-region: drag; }
  .wrap { position: relative; width: 100%; height: calc(100vh - 24px); margin-top: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  video {
    max-width: 100vw; max-height: 100vh;
    background: #000;
    outline: none;
    -webkit-app-region: no-drag;
  }
  .toolbar {
    position: fixed; top: 0; left: 0; right: 140px;
    height: 24px;
    display: flex; gap: 2px; align-items: center;
    background: #0a0a0a;
    padding: 0 8px; color: #fff; font-size: 11px;
    -webkit-app-region: drag;
    z-index: 10;
    border: none; border-radius: 0;
  }
  .toolbar button {
    border: none; background: transparent; color: #fff;
    padding: 1px 6px; font-size: 12px; cursor: pointer;
    border-radius: 4px;
    -webkit-app-region: no-drag;
    transition: background 0.15s;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.15); }
  .title { font-size: 11px; opacity: 0.75; padding: 0 6px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; -webkit-app-region: drag; }
  .pin-active { color: #2AABEE !important; }
  .error {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 16px 24px; background: rgba(20,20,20,0.95); border-radius: 12px;
    border: 1px solid rgba(255,60,60,0.3); color: #ff6b6b; font-size: 14px;
    max-width: 420px; text-align: center;
    display: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <video id="v" controls preload="auto" playsinline></video>
  <div id="err" class="error"></div>
  <div class="toolbar">
    <button id="pip" title="Мини-плеер в углу (поверх всех окон)">◰</button>
    <span class="title" id="title">Видео</span>
    <!-- v0.87.38: _ ▢ ✕ убраны — используются нативные кнопки Windows (titleBarOverlay) -->
    <!-- v0.87.70: subtitles/audio tracks кнопки удалены — не работали, не нужны -->
  </div>
</div>
<script>
  const videoEl = document.getElementById('v')
  const errEl = document.getElementById('err')
  const titleEl = document.getElementById('title')

  videoEl.addEventListener('error', (e) => {
    const code = videoEl.error?.code || '?'
    const msg = videoEl.error?.message || ''
    errEl.textContent = `⚠️ Ошибка видео (код ${code}): ${msg || 'файл не найден или формат не поддерживается'}\n\nURL: ${videoEl.src?.slice(0, 120)}`
    errEl.style.display = 'block'
    console.error('[video-player] error:', code, msg, videoEl.src)
  })
  videoEl.addEventListener('loadedmetadata', () => { errEl.style.display = 'none' })

  // v0.87.38: если через 5 сек видео не начало играть и нет ошибки — показать предупреждение
  let loadTimer = null
  function startLoadWatchdog() {
    if (loadTimer) clearTimeout(loadTimer)
    loadTimer = setTimeout(() => {
      if (!videoEl.src || videoEl.src === '' || videoEl.src === window.location.href) {
        errEl.textContent = `⚠️ Источник видео не установлен!\n\nquery src: ${querySrc || 'НЕТ'}\nwindow.video: ${typeof window.video}\nlocation.search: ${window.location.search?.slice(0,100) || 'пусто'}`
        errEl.style.display = 'block'
        console.error('[video-player] watchdog: videoEl.src ПУСТ!', { querySrc, windowVideo: typeof window.video, search: window.location.search })
      } else if (videoEl.readyState < 2 && errEl.style.display === 'none') {
        errEl.textContent = `⚠️ Видео не загружается (readyState=${videoEl.readyState}).\n\nURL: ${videoEl.src?.slice(0, 120)}\n\nПопробуйте закрыть и открыть заново.`
        errEl.style.display = 'block'
        console.error('[video-player] watchdog: readyState=' + videoEl.readyState, 'src=' + videoEl.src)
      }
    }, 5000)
  }
  // Запускаем watchdog сразу при загрузке страницы (если querySrc не сработал)
  startLoadWatchdog()
  videoEl.addEventListener('canplay', () => { if (loadTimer) { clearTimeout(loadTimer); loadTimer = null } })

  let pipActive = false
  const pipBtn = document.getElementById('pip')
  if (pipBtn) pipBtn.onclick = async () => {
    pipActive = !pipActive
    pipBtn.classList.toggle('pin-active', pipActive)
    await window.video.togglePip(pipActive)
  }

  // v0.87.70: удалены subtitles / audio tracks — не работали корректно, функция убрана.
  // v0.87.38: кнопки close/min/max = нативные Windows (titleBarOverlay), не наш JS

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (window.video?.close) window.video.close()
      else window.close()
    }
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); videoEl.paused ? videoEl.play() : videoEl.pause() }
    if (e.key === 'ArrowRight') { videoEl.currentTime = Math.min(videoEl.duration || 0, videoEl.currentTime + 5) }
    if (e.key === 'ArrowLeft') { videoEl.currentTime = Math.max(0, videoEl.currentTime - 5) }
    if (e.key === 'm') { videoEl.muted = !videoEl.muted }
    if (e.key === 'f') { if (document.fullscreenElement) document.exitFullscreen(); else videoEl.requestFullscreen() }
  })

  // v0.87.38: FALLBACK — если preload не загрузился, читаем src из query params
  // (loadFile передаёт их). Это гарантирует что видео заиграет даже без IPC.
  // DEBUG: показываем что получили
  console.log('[video-player] === DEBUG ===')
  console.log('[video-player] location.href:', window.location.href)
  console.log('[video-player] location.search:', window.location.search)
  console.log('[video-player] window.video:', typeof window.video, window.video ? Object.keys(window.video) : 'undefined')

  const params = new URLSearchParams(window.location.search)
  const querySrc = params.get('src')
  console.log('[video-player] querySrc:', querySrc?.slice(0, 120) || 'NULL')
  if (querySrc) {
    console.log('[video-player] init from query:', querySrc.slice(0, 120))
    videoEl.src = querySrc
    if (params.get('title')) titleEl.textContent = params.get('title')
    const st = parseFloat(params.get('startTime'))
    if (st > 0) videoEl.addEventListener('loadedmetadata', () => { videoEl.currentTime = st }, { once: true })
    if (params.get('pip') === '1') { pipActive = true; pipBtn.classList.add('pin-active') }
    startLoadWatchdog()
    videoEl.play().catch(() => {})
  }

  // IPC path — для reuse-case (переключение видео в уже открытом окне)
  if (window.video?.onSetSrc) {
    window.video.onSetSrc(({ src, title, startTime, pip }) => {
      console.log('[video-player] set src via IPC:', src?.slice(0, 120))
      videoEl.src = src
      startLoadWatchdog()
      if (title) titleEl.textContent = title
      // v0.87.36: продолжить с указанной секунды (из inline-плеера в чате)
      if (typeof startTime === 'number' && startTime > 0) {
        const applyStart = () => { videoEl.currentTime = startTime }
        if (videoEl.readyState >= 1) applyStart()
        else videoEl.addEventListener('loadedmetadata', applyStart, { once: true })
      }
      // v0.87.36: если открылось сразу в PiP режиме — синхронизируем состояние кнопки
      if (pip) { pipActive = true; pipBtn.classList.add('pin-active') }
      videoEl.play().catch(() => {})
    })
  }
</script>
</body>
</html>
