<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' cc-media: file: blob: data: https:; media-src * cc-media: file: blob: data:; img-src * cc-media: file: blob: data: https: http:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
<title>Видео</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; color: #fff; }
  body { display: flex; align-items: center; justify-content: center; user-select: none; -webkit-app-region: drag; }
  .wrap { position: relative; width: 100%; height: calc(100% - 36px); margin-top: 36px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  video {
    max-width: 100vw; max-height: 100vh;
    background: #000;
    outline: none;
    -webkit-app-region: no-drag;
  }
  .toolbar {
    position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; align-items: center;
    background: rgba(20,20,20,0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 6px 10px; color: #fff; font-size: 13px;
    -webkit-app-region: no-drag;
    z-index: 10;
    opacity: 0.3; transition: opacity 0.2s;
  }
  .toolbar:hover { opacity: 1; }
  .toolbar button {
    border: none; background: transparent; color: #fff;
    padding: 4px 10px; font-size: 14px; cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.12); }
  .title { font-size: 12px; opacity: 0.85; padding: 0 8px; max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; border-left: 1px solid rgba(255,255,255,0.15); border-right: 1px solid rgba(255,255,255,0.15); }
  .pin-active { color: #2AABEE !important; }
  .track-menu {
    position: absolute; top: 48px; right: 10px;
    background: rgba(20,20,20,0.95); backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 6px;
    color: #fff; font-size: 12px;
    min-width: 180px;
    -webkit-app-region: no-drag;
    z-index: 20;
  }
  .track-menu button {
    display: block; width: 100%; text-align: left;
    padding: 6px 10px; background: transparent; color: #fff;
    border: none; border-radius: 4px; cursor: pointer; font-size: 12px;
  }
  .track-menu button:hover { background: rgba(255,255,255,0.1); }
  .track-menu button.active { background: rgba(42,171,238,0.3); color: #2AABEE; }
  .track-menu h4 { margin: 4px 8px; font-size: 11px; opacity: 0.6; text-transform: uppercase; }
  .error {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 16px 24px; background: rgba(20,20,20,0.95); border-radius: 12px;
    border: 1px solid rgba(255,60,60,0.3); color: #ff6b6b; font-size: 14px;
    max-width: 420px; text-align: center;
    display: none;
  }
</style>
</head>
<body>
<div class="wrap">
  <video id="v" controls preload="auto" playsinline></video>
  <div id="err" class="error"></div>
  <div class="toolbar">
    <button id="pin" title="Закрепить поверх всех окон">📌</button>
    <button id="pip" title="Мини-плеер в углу (поверх всех окон)">◰</button>
    <button id="audio-btn" title="Аудио-дорожка" style="display:none">🎧</button>
    <button id="sub-btn" title="Субтитры" style="display:none">CC</button>
    <span class="title" id="title">Видео</span>
    <!-- v0.87.38: _ ▢ ✕ убраны — используются нативные кнопки Windows (titleBarOverlay) -->
  </div>
  <!-- Меню выбора audio track / subtitles -->
  <div id="track-menu" class="track-menu" style="display:none"></div>
</div>
<script>
  const video = document.getElementById('v')
  const errEl = document.getElementById('err')
  const titleEl = document.getElementById('title')

  video.addEventListener('error', (e) => {
    const code = video.error?.code || '?'
    const msg = video.error?.message || ''
    errEl.textContent = `⚠️ Ошибка видео (код ${code}): ${msg || 'файл не найден или формат не поддерживается'}\n\nURL: ${video.src?.slice(0, 120)}`
    errEl.style.display = 'block'
    console.error('[video-player] error:', code, msg, video.src)
  })
  video.addEventListener('loadedmetadata', () => { errEl.style.display = 'none' })

  // v0.87.38: если через 5 сек видео не начало играть и нет ошибки — показать предупреждение
  let loadTimer = null
  function startLoadWatchdog() {
    if (loadTimer) clearTimeout(loadTimer)
    loadTimer = setTimeout(() => {
      if (!video.src || video.src === '' || video.src === window.location.href) {
        errEl.textContent = `⚠️ Источник видео не установлен!\n\nquery src: ${querySrc || 'НЕТ'}\nwindow.video: ${typeof window.video}\nlocation.search: ${window.location.search?.slice(0,100) || 'пусто'}`
        errEl.style.display = 'block'
        console.error('[video-player] watchdog: video.src ПУСТ!', { querySrc, windowVideo: typeof window.video, search: window.location.search })
      } else if (video.readyState < 2 && errEl.style.display === 'none') {
        errEl.textContent = `⚠️ Видео не загружается (readyState=${video.readyState}).\n\nURL: ${video.src?.slice(0, 120)}\n\nПопробуйте закрыть и открыть заново.`
        errEl.style.display = 'block'
        console.error('[video-player] watchdog: readyState=' + video.readyState, 'src=' + video.src)
      }
    }, 5000)
  }
  // Запускаем watchdog сразу при загрузке страницы (если querySrc не сработал)
  startLoadWatchdog()
  video.addEventListener('canplay', () => { if (loadTimer) { clearTimeout(loadTimer); loadTimer = null } })

  // v0.87.38: pin/pip кнопки — работают через preload (если есть) ИЛИ ничего не делают.
  // Главные кнопки (close/min/max) = нативные Windows, не зависят от JS.
  let pinned = false
  const pinBtn = document.getElementById('pin')
  if (pinBtn) pinBtn.onclick = async () => {
    pinned = !pinned
    pinBtn.classList.toggle('pin-active', pinned)
    try { await window.video?.togglePin(pinned) } catch(_) {}
  }

  // v0.87.35: PiP — компактное окно в углу (через main IPC, не Chromium PiP)
  // Это даёт resize, move, alwaysOnTop — стандартное Chromium PiP API не даёт resize.
  let pipActive = false
  const pipBtn = document.getElementById('pip')
  pipBtn.onclick = async () => {
    pipActive = !pipActive
    pipBtn.classList.toggle('pin-active', pipActive)
    try { await window.video?.togglePip(pipActive) } catch(_) {}
  }

  // v0.87.35: выбор audio tracks / subtitles. Если в video есть несколько —
  // кнопки 🎧 / CC показываются, клик открывает меню выбора.
  const audioBtn = document.getElementById('audio-btn')
  const subBtn = document.getElementById('sub-btn')
  const menu = document.getElementById('track-menu')

  function renderMenu(kind) {
    menu.innerHTML = ''
    const h = document.createElement('h4')
    h.textContent = kind === 'audio' ? 'Аудио-дорожка' : 'Субтитры'
    menu.appendChild(h)
    if (kind === 'audio' && video.audioTracks) {
      const tracks = video.audioTracks
      for (let i = 0; i < tracks.length; i++) {
        const t = tracks[i]
        const b = document.createElement('button')
        b.textContent = t.label || t.language || ('Дорожка ' + (i + 1))
        if (t.enabled) b.classList.add('active')
        b.onclick = () => {
          for (let j = 0; j < tracks.length; j++) tracks[j].enabled = j === i
          menu.style.display = 'none'
        }
        menu.appendChild(b)
      }
    } else if (kind === 'sub') {
      const tracks = video.textTracks
      const off = document.createElement('button')
      off.textContent = 'Отключить'
      if (Array.from(tracks).every(t => t.mode !== 'showing')) off.classList.add('active')
      off.onclick = () => {
        for (const t of tracks) t.mode = 'hidden'
        menu.style.display = 'none'
      }
      menu.appendChild(off)
      for (let i = 0; i < tracks.length; i++) {
        const t = tracks[i]
        const b = document.createElement('button')
        b.textContent = t.label || t.language || ('Субтитры ' + (i + 1))
        if (t.mode === 'showing') b.classList.add('active')
        b.onclick = () => {
          for (const other of tracks) other.mode = 'hidden'
          t.mode = 'showing'
          menu.style.display = 'none'
        }
        menu.appendChild(b)
      }
    }
    menu.style.display = 'block'
  }
  audioBtn.onclick = () => {
    menu.style.display = (menu.style.display === 'none' && menu.dataset.kind !== 'audio') ? 'block' : 'none'
    menu.dataset.kind = 'audio'
    renderMenu('audio')
  }
  subBtn.onclick = () => {
    menu.style.display = (menu.style.display === 'none' && menu.dataset.kind !== 'sub') ? 'block' : 'none'
    menu.dataset.kind = 'sub'
    renderMenu('sub')
  }
  document.addEventListener('click', (e) => {
    if (!menu.contains(e.target) && e.target !== audioBtn && e.target !== subBtn) {
      menu.style.display = 'none'
    }
  })

  // После загрузки метаданных показать кнопки если есть tracks
  video.addEventListener('loadedmetadata', () => {
    const hasAudio = video.audioTracks && video.audioTracks.length > 1
    const hasSub = video.textTracks && video.textTracks.length > 0
    audioBtn.style.display = hasAudio ? '' : 'none'
    subBtn.style.display = hasSub ? '' : 'none'
  })
  // v0.87.38: кнопки close/min/max = нативные Windows (titleBarOverlay), не наш JS

  window.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (window.video?.close) window.video.close()
      else window.close()
    }
    if (e.key === ' ' || e.key === 'k') { e.preventDefault(); video.paused ? video.play() : video.pause() }
    if (e.key === 'ArrowRight') { video.currentTime = Math.min(video.duration || 0, video.currentTime + 5) }
    if (e.key === 'ArrowLeft') { video.currentTime = Math.max(0, video.currentTime - 5) }
    if (e.key === 'm') { video.muted = !video.muted }
    if (e.key === 'f') { if (document.fullscreenElement) document.exitFullscreen(); else video.requestFullscreen() }
  })

  // v0.87.38: FALLBACK — если preload не загрузился, читаем src из query params
  // (loadFile передаёт их). Это гарантирует что видео заиграет даже без IPC.
  // DEBUG: показываем что получили
  console.log('[video-player] === DEBUG ===')
  console.log('[video-player] location.href:', window.location.href)
  console.log('[video-player] location.search:', window.location.search)
  console.log('[video-player] window.video:', typeof window.video, window.video ? Object.keys(window.video) : 'undefined')

  const params = new URLSearchParams(window.location.search)
  const querySrc = params.get('src')
  console.log('[video-player] querySrc:', querySrc?.slice(0, 120) || 'NULL')
  if (querySrc) {
    console.log('[video-player] init from query:', querySrc.slice(0, 120))
    video.src = querySrc
    if (params.get('title')) titleEl.textContent = params.get('title')
    const st = parseFloat(params.get('startTime'))
    if (st > 0) video.addEventListener('loadedmetadata', () => { video.currentTime = st }, { once: true })
    if (params.get('pip') === '1') { pipActive = true; pipBtn.classList.add('pin-active') }
    startLoadWatchdog()
    video.play().catch(() => {})
  }

  // IPC path — для reuse-case (переключение видео в уже открытом окне)
  if (window.video?.onSetSrc) {
    window.video.onSetSrc(({ src, title, startTime, pip }) => {
      console.log('[video-player] set src via IPC:', src?.slice(0, 120))
      video.src = src
      startLoadWatchdog()
      if (title) titleEl.textContent = title
      // v0.87.36: продолжить с указанной секунды (из inline-плеера в чате)
      if (typeof startTime === 'number' && startTime > 0) {
        const applyStart = () => { video.currentTime = startTime }
        if (video.readyState >= 1) applyStart()
        else video.addEventListener('loadedmetadata', applyStart, { once: true })
      }
      // v0.87.36: если открылось сразу в PiP режиме — синхронизируем состояние кнопки
      if (pip) { pipActive = true; pipBtn.classList.add('pin-active') }
      video.play().catch(() => {})
    })
  }
</script>
</body>
</html>
