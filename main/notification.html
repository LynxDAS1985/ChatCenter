<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }
  #container {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 4px;
  }
  .notif-item {
    display: flex;
    align-items: center;
    min-height: 82px;
    padding-left: 5px;
    background: #1a1a2e;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transform: translateX(380px);
    opacity: 0;
    animation: slideIn 300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .notif-item.hovered {
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .notif-item.expanded {
    align-items: flex-start;
    cursor: default;
  }
  /* Плавная анимация action-row при expand/collapse */
  .action-row {
    display: flex;
    justify-content: flex-start;
    gap: 6px;
    margin-left: 0;
    max-height: 0;
    overflow: hidden;
    transition: max-height 200ms ease-out, margin-top 200ms ease-out, opacity 200ms ease-out;
    opacity: 0;
    margin-top: 0;
  }
  .notif-item.expanded .action-row {
    max-height: 60px;
    opacity: 1;
    margin-top: 8px;
  }
  /* v0.60.5: dismiss полностью через inline-стили — без мигания */
  @keyframes slideIn {
    0%   { transform: translateX(380px) scale(0.95); opacity: 0; }
    70%  { transform: translateX(-8px) scale(1); opacity: 1; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }
  /* fadeSlide убран — dismiss через inline transitions */
  /* ── v0.63.0: Стэк сообщений внутри карточки ── */
  .stacked-msg {
    border-top: 1px solid rgba(255,255,255,0.08);
    margin-top: 6px;
    padding-top: 6px;
    animation: stackFadeIn 200ms ease-out;
  }
  .stacked-msg .stacked-body {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    margin-top: 1px;
  }
  /* v0.63.2: контейнер стэка с ограничением высоты */
  .stack-container {
    max-height: 120px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .stack-container::-webkit-scrollbar { width: 3px; }
  .stack-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  .stack-container::-webkit-scrollbar-track { background: transparent; }
  @keyframes stackFadeIn {
    0%   { opacity: 0; transform: translateY(-4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  /* ── Остальные стили ── */
  .color-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    border-radius: 10px 0 0 10px;
    z-index: 1;
  }
  .avatar-wrap {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    margin: 0 10px;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
  }
  .notif-item.expanded .avatar-wrap {
    margin-top: 18px;
  }
  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .text-wrap {
    flex: 1;
    min-width: 0;
    padding: 10px 10px 10px 0;
  }
  .sender {
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    padding-right: 50px;
  }
  /* v0.62.5: messenger-name над аватаркой, padding-top увеличен */
  .messenger-name {
    position: absolute;
    top: 2px;
    left: 10px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    z-index: 1;
  }
  .notif-item.has-mname {
    padding-top: 14px;
  }
  .body-text {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    margin-top: 2px;
  }
  .notif-item.expanded .body-text {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-x: hidden;
    overflow-y: auto;
    text-overflow: unset;
    max-height: 300px;
    color: rgba(255,255,255,0.8);
    /* v0.63.8: при expand убираем flex, время остаётся inline */
    display: block !important;
  }
  .notif-item.expanded .body-text .msg-text-content {
    white-space: pre-wrap;
    overflow: visible;
    text-overflow: unset;
  }
  .action-btn {
    padding: 4px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .action-btn.go-chat {
    background: rgba(42,171,238,0.15);
    border-color: rgba(42,171,238,0.3);
    color: #5bc0f8;
  }
  .action-btn.go-chat:hover {
    background: rgba(42,171,238,0.25);
  }
  /* v0.62.8: эффект перехода в чат */
  @keyframes goChatPulse {
    0%   { box-shadow: 0 0 0 0 rgba(42,171,238,0.5); }
    50%  { box-shadow: 0 0 12px 4px rgba(42,171,238,0.3); }
    100% { box-shadow: 0 0 0 0 rgba(42,171,238,0); }
  }
  @keyframes goChatFlash {
    0%   { background: rgba(42,171,238,0.15); }
    40%  { background: rgba(42,171,238,0.5); color: #fff; }
    100% { background: rgba(42,171,238,0.5); color: #fff; }
  }
  /* v0.62.8: плавный slide-left dismiss после "Перейти к чату" */
  @keyframes goSlideLeft {
    0%   { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(-120px); opacity: 0; }
  }
  .action-btn.mark-read {
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.25);
    color: #4ade80;
  }
  .action-btn.mark-read:hover {
    background: rgba(34,197,94,0.22);
  }
  .expand-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 3px;
    display: none;
  }
  .expand-hint.visible {
    display: block;
  }
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 5px;
    right: 0;
    height: 2px;
    border-radius: 0 0 10px 0;
    transform-origin: right;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  /* v0.62.0: единая кнопка закрытия (×) справа сверху — всегда видна */
  .close-btn {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 22px;
    height: 22px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    line-height: 1;
    opacity: 1;
    transition: all 0.15s;
    z-index: 2;
  }
  .close-btn:hover {
    background: rgba(239,68,68,0.3);
    border-color: rgba(239,68,68,0.4);
    color: #f87171;
    transform: scale(1.1);
  }
  /* v0.63.3→v0.63.4: кастомный тултип для обрезанного текста */
  .cc-tooltip {
    position: fixed;
    max-width: 360px;
    padding: 8px 12px;
    background: #2d2d4a;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: rgba(255,255,255,0.9);
    font-size: 12px;
    line-height: 1.4;
    word-wrap: break-word;
    white-space: pre-wrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 100;
    pointer-events: auto;
    cursor: pointer;
    user-select: none;
    opacity: 1;
    transition: opacity 150ms ease-out;
    animation: tooltipFadeIn 150ms ease-out;
  }
  .cc-tooltip.fading {
    opacity: 0;
    pointer-events: none;
  }
  /* v0.63.8: время отправки перед текстом в карточке */
  .msg-time {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-right: 4px;
    flex-shrink: 0;
  }
  /* v0.63.6: компактная иконка копирования в правом верхнем углу */
  .cc-tooltip .copy-icon {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    border-radius: 4px;
    transition: all 0.15s;
  }
  .cc-tooltip:hover .copy-icon {
    color: rgba(255,255,255,0.6);
    background: rgba(255,255,255,0.08);
  }
  .cc-tooltip.copied .copy-icon {
    color: #4ade80;
    background: rgba(34,197,94,0.15);
  }
  .cc-tooltip.copied {
    border-color: rgba(34,197,94,0.4);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px rgba(34,197,94,0.2);
  }
  /* v0.63.6: мини-превью стэка */
  .cc-tooltip .stack-preview-row {
    display: flex;
    gap: 6px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    /* v0.63.7: staggered анимация строк стэка */
    opacity: 0;
    transform: translateY(-6px);
    animation: stackRowSlideIn 200ms ease-out forwards;
  }
  .cc-tooltip .stack-preview-row:last-child {
    border-bottom: none;
  }
  .cc-tooltip .sp-time {
    flex-shrink: 0;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
    min-width: 32px;
  }
  .cc-tooltip .sp-text {
    font-size: 12px;
    color: rgba(255,255,255,0.8);
    word-break: break-word;
  }
  /* v0.63.7: staggered появление строк стэка */
  @keyframes stackRowSlideIn {
    0%   { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes tooltipFadeIn {
    0%   { opacity: 0; transform: translateY(4px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="container"></div>
<script>
  const MAX_ITEMS = 6
  const container = document.getElementById('container')
  const items = new Map() // id → { el, timer, expanded, remainingMs, startTs, dismissMs, paused }
  // v0.63.0: стэк — messengerId → hostItemId (id карточки, в которую складываются сообщения)
  const stacks = new Map() // messengerId → { hostId, childIds: [id,...] }
  let groupingEnabled = false
  let showTimeEnabled = true // v0.63.8: показ времени перед текстом (настройка из settings)
  let hoveredItemId = null
  // v0.60.6: каскадное появление — очередь задержки
  let cascadeQueue = 0
  let cascadeTimer = null

  function calcHeight() {
    let h = 0
    for (const child of container.children) {
      // Пропускаем элементы в процессе dismiss (opacity=0 или height=0)
      if (child.style.pointerEvents === 'none') continue
      const ch = child.offsetHeight
      if (ch > 0) h += ch + 4
    }
    return h > 0 ? h + 4 : 0
  }

  function reportHeight() {
    setTimeout(() => {
      window.notifApi.resize(calcHeight())
    }, 60)
  }

  // ── Per-item hover (v0.60.3) ──
  function pauseItem(item) {
    if (item.paused || !item.dismissMs || item.dismissMs <= 0) return
    item.remainingMs -= (Date.now() - item.startTs)
    if (item.remainingMs < 0) item.remainingMs = 0
    clearTimeout(item.timer)
    item.timer = null
    item.paused = true
    const progress = item.el.querySelector('.progress-bar')
    if (progress) progress.style.animationPlayState = 'paused'
    item.el.classList.add('hovered')
  }

  function resumeItem(item) {
    if (!item.paused || !item.dismissMs || item.dismissMs <= 0) return
    item.paused = false
    item.startTs = Date.now()
    const progress = item.el.querySelector('.progress-bar')
    if (progress) progress.style.animationPlayState = 'running'
    const id = item.el.dataset.id
    item.timer = setTimeout(() => dismissItem(id, false), item.remainingMs || 3000)
    item.el.classList.remove('hovered')
  }

  container.addEventListener('mousemove', (e) => {
    const target = e.target.closest('.notif-item')
    const newId = target ? target.dataset.id : null
    if (newId === hoveredItemId) return
    if (hoveredItemId) {
      const oldItem = items.get(hoveredItemId)
      if (oldItem && !oldItem.isStackChild) resumeItem(oldItem)
    }
    hoveredItemId = newId
    if (newId) {
      const newItem = items.get(newId)
      if (newItem && !newItem.isStackChild) pauseItem(newItem)
    }
  })

  container.addEventListener('mouseleave', () => {
    if (hoveredItemId) {
      const item = items.get(hoveredItemId)
      if (item && !item.isStackChild) resumeItem(item)
      hoveredItemId = null
    }
  })

  // ── v0.60.5: Dismiss через inline transitions — БЕЗ мигания ──
  function dismissItem(id, fromMain) {
    const item = items.get(id)
    if (!item) return
    if (item.dismissing) return
    item.dismissing = true
    clearTimeout(item.timer)
    if (hoveredItemId === id) hoveredItemId = null
    if (!fromMain) window.notifApi.dismiss(id)

    // v0.63.0: ghost-item (child стэка) — просто удаляем из Map
    if (item.isStackChild) {
      items.delete(id)
      return
    }

    // v0.63.0: если это хост стэка — очистить дочерние
    if (item.messengerId) {
      const stack = stacks.get(item.messengerId)
      if (stack && stack.hostId === id) {
        cleanupStack(item.messengerId)
      }
    }

    const el = item.el
    const h = el.offsetHeight

    // Замораживаем текущее состояние — отменяем slideIn, ставим конечные значения
    el.style.animation = 'none'
    el.style.opacity = '1'
    el.style.transform = 'translateX(0) scale(1)'
    el.style.height = h + 'px'
    el.style.overflow = 'hidden'
    el.style.pointerEvents = 'none'

    // Force reflow — чтобы браузер применил стили выше ДО начала transition
    void el.offsetHeight

    // Этап 1: fade + slide вправо (250мс)
    el.style.transition = 'opacity 250ms ease-out, transform 250ms ease-out'
    el.style.opacity = '0'
    el.style.transform = 'translateX(80px) scale(0.95)'

    // Этап 2: пауза 80мс → коллапс высоты 180мс (v0.60.6: естественная задержка)
    setTimeout(() => {
      el.style.transition = 'height 180ms ease-in-out, min-height 180ms ease-in-out, margin-bottom 180ms ease-in-out'
      el.style.height = '0'
      el.style.minHeight = '0'
      el.style.marginBottom = '-4px'
      reportHeight()

      // Этап 3: удаление из DOM
      setTimeout(() => {
        el.remove()
        items.delete(id)
        if (groupingEnabled && item.messengerId) cleanupStack(item.messengerId)
        reportHeight()
      }, 190)
    }, 330)
  }

  function toggleExpand(data, el) {
    const item = items.get(data.id)
    if (!item) return
    const isExpanded = el.classList.toggle('expanded')
    item.expanded = isExpanded

    if (isExpanded && item.dismissMs > 0) {
      item.remainingMs -= (Date.now() - item.startTs)
      if (item.remainingMs < 0) item.remainingMs = 0
      clearTimeout(item.timer)
      item.timer = null
      item.paused = true
      const progress = el.querySelector('.progress-bar')
      if (progress) progress.style.animationPlayState = 'paused'
    } else if (!isExpanded && item.dismissMs > 0) {
      item.paused = false
      item.startTs = Date.now()
      const progress = el.querySelector('.progress-bar')
      if (progress) progress.style.animationPlayState = 'running'
      item.timer = setTimeout(() => dismissItem(data.id, false), item.remainingMs || 3000)
    }

    reportHeight()
    setTimeout(reportHeight, 220)
  }

  // ── v0.63.0: Стэк сообщений в одной карточке ──
  // Добавляет сообщение как строку внутри существующей карточки (host)
  function stackMessageIntoHost(hostId, data) {
    const host = items.get(hostId)
    if (!host) return false
    const textWrap = host.el.querySelector('.text-wrap')
    if (!textWrap) return false
    const actionRow = textWrap.querySelector('.action-row')

    // v0.63.2: используем stack-container для ограничения высоты
    let stackContainer = textWrap.querySelector('.stack-container')
    if (!stackContainer) {
      stackContainer = document.createElement('div')
      stackContainer.className = 'stack-container'
      if (actionRow) {
        textWrap.insertBefore(stackContainer, actionRow)
      } else {
        textWrap.appendChild(stackContainer)
      }
    }

    // Создаём блок с новым сообщением — только текст, без дублирования имени
    const msgDiv = document.createElement('div')
    msgDiv.className = 'stacked-msg'
    msgDiv.dataset.stackedId = data.id

    const bodyDiv = document.createElement('div')
    bodyDiv.className = 'stacked-body'
    const stackTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
    bodyDiv.dataset.ts = stackTime
    // v0.63.8: время перед текстом в стэке
    if (showTimeEnabled) {
      const timeSpan = document.createElement('span')
      timeSpan.className = 'msg-time'
      timeSpan.textContent = stackTime
      bodyDiv.appendChild(timeSpan)
      bodyDiv.style.display = 'flex'
      bodyDiv.style.alignItems = 'baseline'
      const textNode = document.createElement('span')
      textNode.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0'
      textNode.textContent = data.body || ''
      bodyDiv.appendChild(textNode)
    } else {
      bodyDiv.textContent = data.body || ''
    }
    msgDiv.appendChild(bodyDiv)

    stackContainer.appendChild(msgDiv)
    // Автоскролл вниз к новому сообщению
    stackContainer.scrollTop = stackContainer.scrollHeight

    // Обновляем стэк
    const stack = stacks.get(data.messengerId)
    if (stack) {
      stack.childIds.push(data.id)
    }

    // Сбрасываем таймер хоста — обновляем время
    if (host.dismissMs > 0) {
      clearTimeout(host.timer)
      host.remainingMs = host.dismissMs
      host.startTs = Date.now()
      host.timer = setTimeout(() => dismissItem(hostId, false), host.dismissMs)
      const progress = host.el.querySelector('.progress-bar')
      if (progress) {
        progress.style.animation = 'none'
        void progress.offsetHeight
        progress.style.animation = 'shrink ' + (host.dismissMs / 1000) + 's linear forwards'
      }
    }

    reportHeight()
    setTimeout(reportHeight, 220)
    return true
  }

  // Очистка стэка при dismiss хоста
  function cleanupStack(messengerId) {
    const stack = stacks.get(messengerId)
    if (!stack) return
    // Dismiss все child items (скрытые, без DOM)
    stack.childIds.forEach(id => {
      const child = items.get(id)
      if (child && !child.dismissing) {
        child.dismissing = true
        clearTimeout(child.timer)
        window.notifApi.dismiss(id)
        items.delete(id)
      }
    })
    stacks.delete(messengerId)
  }

  // v0.60.7: мгновенное удаление для FIFO (без анимации)
  function forceRemoveItem(id) {
    const item = items.get(id)
    if (!item) return
    clearTimeout(item.timer)
    // v0.63.0: ghost-item (child стэка) — только удаляем из Map
    if (item.isStackChild) {
      items.delete(id)
      window.notifApi.dismiss(id)
      return
    }
    item.el.remove()
    items.delete(id)
    window.notifApi.dismiss(id)
  }

  function addNotification(data) {
    if (items.has(data.id)) {
      forceRemoveItem(data.id)
    }

    // v0.60.4: сохраняем флаг группировки
    if (data.grouping !== undefined) groupingEnabled = !!data.grouping
    // v0.63.8: сохраняем флаг показа времени
    if (data.showMessageTime !== undefined) showTimeEnabled = !!data.showMessageTime

    // v0.63.0: стэковая группировка — складываем в существующую карточку
    if (groupingEnabled && data.messengerId) {
      const stack = stacks.get(data.messengerId)
      if (stack && items.has(stack.hostId) && !items.get(stack.hostId).dismissing) {
        // Складываем в хост-карточку как дополнительную строку
        const stacked = stackMessageIntoHost(stack.hostId, data)
        if (stacked) {
          // Создаём ghost-item (без DOM) для отслеживания id
          items.set(data.id, {
            el: items.get(stack.hostId).el, // ссылка на хост-элемент
            timer: null,
            expanded: false,
            remainingMs: 0,
            startTs: Date.now(),
            dismissMs: 0,
            paused: false,
            messengerId: data.messengerId,
            messengerName: data.messengerName || '',
            senderName: data.title || '',
            bodyText: data.body || '',
            color: data.color || '#2AABEE',
            isStackChild: true,
            stackHostId: stack.hostId,
          })
          return // не создаём отдельную карточку
        }
      }
    }

    while (items.size >= MAX_ITEMS) {
      const firstKey = items.keys().next().value
      forceRemoveItem(firstKey)
    }

    const hasFullBody = data.fullBody && data.fullBody.length > (data.body || '').length

    const el = document.createElement('div')
    el.className = 'notif-item'
    el.dataset.id = data.id

    // v0.62.5: название мессенджера над аватаркой слева + padding
    const mName = data.messengerName || ''
    if (mName) {
      el.classList.add('has-mname')
      const mNameEl = document.createElement('div')
      mNameEl.className = 'messenger-name'
      mNameEl.textContent = mName
      el.appendChild(mNameEl)
    }

    const bar = document.createElement('div')
    bar.className = 'color-bar'
    bar.style.background = data.color || '#2AABEE'
    el.appendChild(bar)

    const avWrap = document.createElement('div')
    avWrap.className = 'avatar-wrap'
    avWrap.style.background = (data.color || '#2AABEE') + '33'
    if (data.iconDataUrl) {
      const img = document.createElement('img')
      img.src = data.iconDataUrl
      img.onerror = () => { img.remove(); avWrap.textContent = data.emoji || '\u{1F4AC}' }
      avWrap.appendChild(img)
    } else {
      avWrap.textContent = data.emoji || '\u{1F4AC}'
    }
    el.appendChild(avWrap)

    const textWrap = document.createElement('div')
    textWrap.className = 'text-wrap'
    const sender = document.createElement('div')
    sender.className = 'sender'
    const senderName = data.title || ''
    sender.textContent = senderName || mName
    textWrap.appendChild(sender)

    const bodyText = document.createElement('div')
    bodyText.className = 'body-text'
    bodyText.dataset.short = data.body || ''
    bodyText.dataset.full = data.fullBody || data.body || ''
    const nowTime = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
    bodyText.dataset.ts = nowTime
    // v0.63.8: время перед текстом (управляется настройкой showMessageTime)
    if (showTimeEnabled) {
      const timeSpan = document.createElement('span')
      timeSpan.className = 'msg-time'
      timeSpan.textContent = nowTime
      bodyText.appendChild(timeSpan)
      bodyText.style.display = 'flex'
      bodyText.style.alignItems = 'baseline'
      const textNode = document.createElement('span')
      textNode.className = 'msg-text-content'
      textNode.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0'
      textNode.textContent = data.body || ''
      bodyText.appendChild(textNode)
    } else {
      bodyText.textContent = data.body || ''
    }
    textWrap.appendChild(bodyText)

    const hint = document.createElement('div')
    hint.className = 'expand-hint'
    hint.style.display = 'none'
    textWrap.appendChild(hint)

    const actionRow = document.createElement('div')
    actionRow.className = 'action-row'

    const goBtn = document.createElement('button')
    goBtn.className = 'action-btn go-chat'
    goBtn.textContent = '\u2192 Перейти к чату'
    goBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      window.notifApi.click(data.id)
      // v0.62.8: красивый эффект перехода — пульс + flash + slide
      goBtn.style.pointerEvents = 'none'
      goBtn.textContent = '✓ Переход...'
      goBtn.style.animation = 'goChatPulse 400ms ease-out, goChatFlash 400ms ease-out forwards'
      goBtn.style.background = 'rgba(42,171,238,0.5)'
      goBtn.style.color = '#fff'
      goBtn.style.borderColor = 'rgba(42,171,238,0.6)'
      // Через 500мс — slide-left dismiss всей карточки
      setTimeout(() => {
        const item = items.get(data.id)
        if (!item) return
        const el = item.el
        const h = el.offsetHeight
        el.style.animation = 'none'
        el.style.opacity = '1'
        el.style.transform = 'translateX(0) scale(1)'
        el.style.height = h + 'px'
        el.style.overflow = 'hidden'
        el.style.pointerEvents = 'none'
        void el.offsetHeight
        // Slide влево (в сторону чата) вместо обычного slide вправо
        el.style.transition = 'opacity 300ms ease-in, transform 300ms ease-in'
        el.style.opacity = '0'
        el.style.transform = 'translateX(-120px) scale(0.95)'
        setTimeout(() => {
          el.style.transition = 'height 180ms ease-in-out, min-height 180ms ease-in-out, margin-bottom 180ms ease-in-out'
          el.style.height = '0'
          el.style.minHeight = '0'
          el.style.marginBottom = '-4px'
          reportHeight()
          setTimeout(() => {
            el.remove()
            items.delete(data.id)
            if (groupingEnabled && item.messengerId) cleanupStack(item.messengerId)
            reportHeight()
          }, 190)
        }, 320)
      }, 500)
      // Отменяем стандартный таймер
      const item = items.get(data.id)
      if (item) { clearTimeout(item.timer); item.timer = null; item.dismissing = true }
    })
    actionRow.appendChild(goBtn)

    const readBtn2 = document.createElement('button')
    readBtn2.className = 'action-btn mark-read'
    readBtn2.textContent = '\u2713 Прочитано'
    readBtn2.addEventListener('click', (e) => {
      e.stopPropagation()
      window.notifApi.markRead(data.id)
      // v0.62.1: визуальное подтверждение — кнопка зеленеет, потом dismiss
      readBtn2.textContent = '\u2713 Готово!'
      readBtn2.style.background = 'rgba(34,197,94,0.35)'
      readBtn2.style.color = '#4ade80'
      readBtn2.style.borderColor = 'rgba(34,197,94,0.5)'
      readBtn2.style.pointerEvents = 'none'
      setTimeout(() => dismissItem(data.id, false), 800)
    })
    actionRow.appendChild(readBtn2)

    textWrap.appendChild(actionRow)
    el.appendChild(textWrap)

    // v0.62.0: единая кнопка закрытия (×) справа сверху — убрана зелёная галочка
    const closeBtn = document.createElement('button')
    closeBtn.className = 'close-btn'
    closeBtn.textContent = '\u00d7'
    closeBtn.title = '\u0417\u0430\u043A\u0440\u044B\u0442\u044C'
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      dismissItem(data.id, false)
    })
    el.appendChild(closeBtn)

    const progress = document.createElement('div')
    progress.className = 'progress-bar'
    progress.style.background = data.color || '#2AABEE'
    el.appendChild(progress)

    el.addEventListener('click', (e) => {
      toggleExpand(data, el)
      const bText = el.querySelector('.body-text')
      const hintEl = el.querySelector('.expand-hint')
      if (el.classList.contains('expanded')) {
        if (hasFullBody && bText) bText.textContent = bText.dataset.full
      } else {
        if (hasFullBody && bText) bText.textContent = bText.dataset.short
      }
    })

    // v0.60.7: каскад — макс 5 слотов × 100мс, потом без задержки
    const cascadeDelay = Math.min(cascadeQueue, 5) * 100
    if (cascadeDelay > 0) {
      el.style.animationDelay = cascadeDelay + 'ms'
      el.style.animationFillMode = 'backwards'
    }
    cascadeQueue++
    clearTimeout(cascadeTimer)
    cascadeTimer = setTimeout(() => { cascadeQueue = 0 }, 600)

    container.appendChild(el)

    const thisDismissMs = data.dismissMs
    let timer = null
    const startTs = Date.now()

    if (thisDismissMs > 0) {
      requestAnimationFrame(() => {
        progress.style.animation = 'shrink ' + (thisDismissMs / 1000) + 's linear forwards'
      })
      // v0.60.4: ВСЕГДА запускаем таймер, даже при expandedByDefault
      timer = setTimeout(() => dismissItem(data.id, false), thisDismissMs)
    } else {
      progress.style.display = 'none'
    }

    // Автораскрытие (визуально) — таймер УЖЕ запущен
    if (data.expandedByDefault) {
      el.classList.add('expanded')
      if (hasFullBody) {
        const bText = el.querySelector('.body-text')
        if (bText) bText.textContent = bText.dataset.full
      }
      const hintEl = el.querySelector('.expand-hint')
      if (hintEl) hintEl.textContent = '\u25B2 свернуть'
    }

    items.set(data.id, {
      el, timer,
      expanded: !!data.expandedByDefault,
      remainingMs: thisDismissMs,
      startTs,
      dismissMs: thisDismissMs,
      paused: false,
      messengerId: data.messengerId || '',
      messengerName: data.messengerName || '',
      senderName: data.title || '',
      bodyText: data.body || '',
      color: data.color || '#2AABEE'
    })

    reportHeight()

    // v0.63.0: обновляем стэк — запоминаем эту карточку как хост для мессенджера
    if (groupingEnabled && data.messengerId && !stacks.has(data.messengerId)) {
      stacks.set(data.messengerId, { hostId: data.id, childIds: [] })
    }
  }

  // ── v0.63.3→v0.63.4: Кастомный тултип — debounce 300мс, fade-out, копирование кликом ──
  let tooltipEl = null
  let tooltipTarget = null
  let tooltipDebounce = null  // v0.63.4: задержка перед показом
  let tooltipFadeTimer = null // v0.63.4: таймер fade-out

  function showTooltip(target) {
    // Проверяем что текст реально обрезан
    if (target.scrollWidth <= target.clientWidth) return
    if (tooltipEl) hideTooltipImmediate()

    tooltipTarget = target
    const fullText = target.dataset.full || target.textContent
    tooltipEl = document.createElement('div')
    tooltipEl.className = 'cc-tooltip'
    tooltipEl.style.paddingRight = '28px' // место для иконки

    // v0.63.8: только полный текст — без времени, без имени
    const textSpan = document.createElement('span')
    textSpan.textContent = fullText
    tooltipEl.appendChild(textSpan)

    // Иконка копирования справа вверху
    const copyIcon = document.createElement('span')
    copyIcon.className = 'copy-icon'
    copyIcon.textContent = '\u{1F4CB}'
    tooltipEl.appendChild(copyIcon)

    // Копирование кликом по всему тултипу
    tooltipEl.addEventListener('click', (e) => {
      e.stopPropagation()
      if (navigator.clipboard) {
        navigator.clipboard.writeText(fullText).then(() => {
          tooltipEl.classList.add('copied')
          copyIcon.textContent = '\u2713'
          setTimeout(() => hideTooltipFade(), 800)
        })
      }
    })

    document.body.appendChild(tooltipEl)

    // Позиционирование: над элементом
    const rect = target.getBoundingClientRect()
    const tW = tooltipEl.offsetWidth
    let left = rect.left
    if (left + tW > window.innerWidth - 8) left = window.innerWidth - tW - 8
    if (left < 4) left = 4
    tooltipEl.style.left = left + 'px'
    tooltipEl.style.bottom = (window.innerHeight - rect.top + 4) + 'px'

    // Если тултип выходит за верх экрана — показать снизу
    requestAnimationFrame(() => {
      if (!tooltipEl) return
      const tRect = tooltipEl.getBoundingClientRect()
      if (tRect.top < 0) {
        tooltipEl.style.bottom = 'auto'
        tooltipEl.style.top = (rect.bottom + 4) + 'px'
      }
    })
  }

  // v0.63.4: плавное исчезновение
  function hideTooltipFade() {
    if (!tooltipEl) return
    clearTimeout(tooltipFadeTimer)
    tooltipEl.classList.add('fading')
    const el = tooltipEl
    tooltipFadeTimer = setTimeout(() => {
      if (el && el.parentNode) el.remove()
      if (tooltipEl === el) { tooltipEl = null; tooltipTarget = null }
    }, 150)
  }

  // Мгновенное скрытие (для смены тултипа между элементами)
  function hideTooltipImmediate() {
    clearTimeout(tooltipFadeTimer)
    clearTimeout(tooltipDebounce)
    tooltipDebounce = null
    if (tooltipEl) { tooltipEl.remove(); tooltipEl = null }
    tooltipTarget = null
  }

  // ── v0.63.6: Мини-превью всего стэка при hover на .stack-container ──
  function showStackPreview(stackContainer) {
    if (tooltipEl) hideTooltipImmediate()
    tooltipTarget = stackContainer

    // Собираем все сообщения стэка: host body-text + stacked-body элементы
    const notifItem = stackContainer.closest('.notif-item')
    const hostBody = notifItem ? notifItem.querySelector('.body-text') : null
    const stackedBodies = stackContainer.querySelectorAll('.stacked-body')

    // Собираем все тексты для копирования
    const allTexts = []
    // v0.63.7: счётчик строк для staggered анимации
    let rowIndex = 0

    tooltipEl = document.createElement('div')
    tooltipEl.className = 'cc-tooltip'
    tooltipEl.style.paddingRight = '28px'

    // Имя отправителя вверху
    const senderEl = notifItem ? notifItem.querySelector('.sender') : null
    if (senderEl) {
      const nameEl = document.createElement('div')
      nameEl.style.cssText = 'font-weight:600;color:#e2e8f0;margin-bottom:4px;font-size:12px'
      nameEl.textContent = senderEl.textContent
      tooltipEl.appendChild(nameEl)
    }

    // Первое (host) сообщение
    if (hostBody) {
      const row = document.createElement('div')
      row.className = 'stack-preview-row'
      // v0.63.7: staggered задержка
      row.style.animationDelay = (rowIndex * 30) + 'ms'
      rowIndex++
      const time = document.createElement('span')
      time.className = 'sp-time'
      time.textContent = hostBody.dataset.ts || ''
      const text = document.createElement('span')
      text.className = 'sp-text'
      const fullHostText = hostBody.dataset.full || hostBody.textContent
      text.textContent = fullHostText
      row.appendChild(time)
      row.appendChild(text)
      tooltipEl.appendChild(row)
      allTexts.push((hostBody.dataset.ts || '') + '  ' + fullHostText)
    }

    // Стэкнутые сообщения
    stackedBodies.forEach(body => {
      const row = document.createElement('div')
      row.className = 'stack-preview-row'
      // v0.63.7: staggered задержка
      row.style.animationDelay = (rowIndex * 30) + 'ms'
      rowIndex++
      const time = document.createElement('span')
      time.className = 'sp-time'
      time.textContent = body.dataset.ts || ''
      const text = document.createElement('span')
      text.className = 'sp-text'
      text.textContent = body.textContent
      row.appendChild(time)
      row.appendChild(text)
      tooltipEl.appendChild(row)
      allTexts.push((body.dataset.ts || '') + '  ' + body.textContent)
    })

    // Иконка копирования
    const copyIcon = document.createElement('span')
    copyIcon.className = 'copy-icon'
    copyIcon.textContent = '\u{1F4CB}'
    tooltipEl.appendChild(copyIcon)

    const allText = allTexts.join('\n')
    tooltipEl.addEventListener('click', (e) => {
      e.stopPropagation()
      if (navigator.clipboard) {
        navigator.clipboard.writeText(allText).then(() => {
          tooltipEl.classList.add('copied')
          copyIcon.textContent = '\u2713'
          setTimeout(() => hideTooltipFade(), 800)
        })
      }
    })

    document.body.appendChild(tooltipEl)

    // Позиционирование
    const rect = stackContainer.getBoundingClientRect()
    const tW = tooltipEl.offsetWidth
    let left = rect.left
    if (left + tW > window.innerWidth - 8) left = window.innerWidth - tW - 8
    if (left < 4) left = 4
    tooltipEl.style.left = left + 'px'
    tooltipEl.style.bottom = (window.innerHeight - rect.top + 4) + 'px'

    requestAnimationFrame(() => {
      if (!tooltipEl) return
      const tRect = tooltipEl.getBoundingClientRect()
      if (tRect.top < 0) {
        tooltipEl.style.bottom = 'auto'
        tooltipEl.style.top = (rect.bottom + 4) + 'px'
      }
    })
  }

  // v0.63.4→v0.63.6: debounce 300мс + делегирование на container
  container.addEventListener('mouseover', (e) => {
    // v0.63.6: приоритет — стэк-контейнер (мини-превью всех сообщений)
    const stackTarget = e.target.closest('.stack-container')
    if (stackTarget && stackTarget !== tooltipTarget) {
      hideTooltipImmediate()
      tooltipDebounce = setTimeout(() => showStackPreview(stackTarget), 300)
      return
    }
    // Обычный тултип для одиночных текстовых элементов (не внутри стэка)
    const target = e.target.closest('.body-text, .sender')
    if (!target || target === tooltipTarget) return
    // Не показываем одиночный тултип если мы внутри stack-container (он покажет превью)
    if (target.closest('.stack-container')) return
    hideTooltipImmediate()
    tooltipDebounce = setTimeout(() => showTooltip(target), 300)
  })
  // v0.63.8: задержка перед скрытием тултипа — даёт время навести на иконку копирования
  let tooltipHideDelay = null
  function scheduleHide() {
    clearTimeout(tooltipHideDelay)
    tooltipHideDelay = setTimeout(() => {
      // Проверяем: мышь НЕ на тултипе?
      if (tooltipEl && !tooltipEl.matches(':hover')) {
        hideTooltipFade()
      }
    }, 100)
  }
  function cancelHide() {
    clearTimeout(tooltipHideDelay)
  }

  container.addEventListener('mouseout', (e) => {
    const target = e.target.closest('.body-text, .stacked-body, .sender, .stack-container')
    if (!target) return
    const related = e.relatedTarget
    // Ушли на тултип — не скрываем
    if (related && related.closest('.cc-tooltip')) { cancelHide(); return }
    // Ушли на дочерний элемент внутри того же stack-container — не скрываем
    if (related && target.closest('.stack-container') && related.closest('.stack-container') === target.closest('.stack-container')) return
    // Ушли на другой текстовый элемент — debounce обработает
    if (related && related.closest('.body-text, .stacked-body, .sender, .stack-container')) {
      clearTimeout(tooltipDebounce)
      tooltipDebounce = null
      if (tooltipEl) hideTooltipFade()
      return
    }
    clearTimeout(tooltipDebounce)
    tooltipDebounce = null
    // v0.63.8: задержка — вдруг мышь идёт на тултип
    scheduleHide()
  })
  // Тултип: при наведении — отменяем скрытие, при уходе — скрываем
  document.body.addEventListener('mouseover', (e) => {
    if (tooltipEl && e.target.closest('.cc-tooltip')) cancelHide()
  })
  document.body.addEventListener('mouseout', (e) => {
    if (!tooltipEl) return
    const from = e.target
    const to = e.relatedTarget
    if (from && from.closest('.cc-tooltip') && !(to && to.closest('.cc-tooltip'))) {
      if (to && to.closest('.body-text, .stacked-body, .sender, .stack-container')) return
      scheduleHide()
    }
  })

  // IPC listeners
  window.notifApi.onNotification((data) => addNotification(data))
  window.notifApi.onDismiss((id) => dismissItem(id, true))
</script>
</body>
</html>
