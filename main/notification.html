<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }
  #container {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 4px;
  }
  .notif-item {
    display: flex;
    align-items: center;
    height: 76px;
    background: #1a1a2e;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transform: translateX(380px);
    opacity: 0;
    animation: slideIn 250ms ease-out forwards;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .notif-item.removing {
    animation: slideOut 200ms ease-in forwards;
  }
  @keyframes slideIn {
    from { transform: translateX(380px); opacity: 0; }
    to   { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideOut {
    from { transform: translateX(0); opacity: 1; }
    to   { transform: translateX(380px); opacity: 0; }
  }
  .color-bar {
    width: 5px;
    height: 100%;
    flex-shrink: 0;
    border-radius: 10px 0 0 10px;
  }
  .avatar-wrap {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    margin: 0 10px;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
  }
  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .text-wrap {
    flex: 1;
    min-width: 0;
    padding-right: 10px;
  }
  .sender {
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }
  .messenger-name {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.5;
  }
  .body-text {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    margin-top: 2px;
  }
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 5px;
    right: 0;
    height: 2px;
    border-radius: 0 0 10px 0;
    transform-origin: right;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  .close-btn {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.3);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .notif-item:hover .close-btn {
    opacity: 1;
  }
  .close-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }
</style>
</head>
<body>
<div id="container"></div>
<script>
  const MAX_ITEMS = 6
  const DEFAULT_DISMISS_MS = 5000
  const container = document.getElementById('container')
  const items = new Map() // id → { el, timer }

  function calcHeight() {
    const count = container.children.length
    // 76px item + 4px gap + 8px container padding
    return count > 0 ? count * 76 + (count - 1) * 4 + 8 : 0
  }

  function reportHeight() {
    window.notifApi.resize(calcHeight())
  }

  function dismissItem(id, fromMain) {
    const item = items.get(id)
    if (!item) return
    clearTimeout(item.timer)
    item.el.classList.add('removing')
    if (!fromMain) window.notifApi.dismiss(id)
    setTimeout(() => {
      item.el.remove()
      items.delete(id)
      reportHeight()
    }, 210)
  }

  function addNotification(data) {
    // { id, title, body, iconDataUrl, color, emoji, messengerName, messengerId }
    // Если уже есть — удалить старый мгновенно
    if (items.has(data.id)) {
      const old = items.get(data.id)
      clearTimeout(old.timer)
      old.el.remove()
      items.delete(data.id)
    }

    // FIFO при переполнении
    while (items.size >= MAX_ITEMS) {
      const firstKey = items.keys().next().value
      dismissItem(firstKey, false)
    }

    const el = document.createElement('div')
    el.className = 'notif-item'
    el.dataset.id = data.id

    // Color bar
    const bar = document.createElement('div')
    bar.className = 'color-bar'
    bar.style.background = data.color || '#2AABEE'
    el.appendChild(bar)

    // Avatar
    const avWrap = document.createElement('div')
    avWrap.className = 'avatar-wrap'
    avWrap.style.background = (data.color || '#2AABEE') + '33'
    if (data.iconDataUrl) {
      const img = document.createElement('img')
      img.src = data.iconDataUrl
      img.onerror = () => { img.remove(); avWrap.textContent = data.emoji || '💬' }
      avWrap.appendChild(img)
    } else {
      avWrap.textContent = data.emoji || '💬'
    }
    el.appendChild(avWrap)

    // Text
    const textWrap = document.createElement('div')
    textWrap.className = 'text-wrap'
    const sender = document.createElement('div')
    sender.className = 'sender'
    const senderName = data.title || ''
    const mName = data.messengerName || ''
    sender.innerHTML = senderName
      ? senderName + ' <span class="messenger-name">' + mName + '</span>'
      : mName
    textWrap.appendChild(sender)
    const bodyText = document.createElement('div')
    bodyText.className = 'body-text'
    bodyText.textContent = data.body || ''
    textWrap.appendChild(bodyText)
    el.appendChild(textWrap)

    // Close button
    const closeBtn = document.createElement('button')
    closeBtn.className = 'close-btn'
    closeBtn.textContent = '\u00d7'
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      dismissItem(data.id, false)
    })
    el.appendChild(closeBtn)

    // Progress bar
    const progress = document.createElement('div')
    progress.className = 'progress-bar'
    progress.style.background = data.color || '#2AABEE'
    el.appendChild(progress)

    // Click → activate
    el.addEventListener('click', () => {
      window.notifApi.click(data.id)
      dismissItem(data.id, false)
    })

    container.appendChild(el)

    // Start progress animation after element is in DOM
    const thisDismissMs = data.dismissMs || DEFAULT_DISMISS_MS
    requestAnimationFrame(() => {
      progress.style.animation = 'shrink ' + (thisDismissMs / 1000) + 's linear forwards'
    })

    // Pause timer on hover
    let remainingMs = thisDismissMs
    let startTs = Date.now()

    const startTimer = () => {
      startTs = Date.now()
      return setTimeout(() => dismissItem(data.id, false), remainingMs)
    }

    let timer = startTimer()

    el.addEventListener('mouseenter', () => {
      remainingMs -= (Date.now() - startTs)
      if (remainingMs < 0) remainingMs = 0
      clearTimeout(timer)
      progress.style.animationPlayState = 'paused'
    })

    el.addEventListener('mouseleave', () => {
      progress.style.animationPlayState = 'running'
      timer = startTimer()
    })

    items.set(data.id, { el, timer })
    reportHeight()
  }

  // IPC listeners
  window.notifApi.onNotification((data) => addNotification(data))
  window.notifApi.onDismiss((id) => dismissItem(id, true))
</script>
</body>
</html>
