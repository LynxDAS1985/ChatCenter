<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }
  #container {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 4px;
  }
  .notif-item {
    display: flex;
    align-items: center;
    min-height: 82px;
    padding-left: 5px;
    background: #1a1a2e;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transform: translateX(380px);
    opacity: 0;
    animation: slideIn 300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .notif-item.hovered {
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .notif-item.expanded {
    align-items: flex-start;
    cursor: default;
  }
  /* Плавная анимация action-row при expand/collapse */
  .action-row {
    display: flex;
    justify-content: flex-start;
    gap: 6px;
    margin-left: -54px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 200ms ease-out, margin-top 200ms ease-out, opacity 200ms ease-out;
    opacity: 0;
    margin-top: 0;
  }
  .notif-item.expanded .action-row {
    max-height: 60px;
    opacity: 1;
    margin-top: 8px;
  }
  /* v0.60.5: dismiss полностью через inline-стили — без мигания */
  @keyframes slideIn {
    0%   { transform: translateX(380px) scale(0.95); opacity: 0; }
    70%  { transform: translateX(-8px) scale(1); opacity: 1; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }
  /* fadeSlide убран — dismiss через inline transitions */
  /* ── Группировка (v0.60.4) ── */
  .group-item {
    display: flex;
    align-items: center;
    min-height: 60px;
    background: #1a1a2e;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transform: translateX(380px);
    opacity: 0;
    animation: slideIn 300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .group-item.hovered {
    border-color: rgba(255,255,255,0.18);
  }
  /* group dismiss — через inline-стили, аналогично notif-item */
  .group-counter {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    margin: 0 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
  }
  .group-text {
    flex: 1;
    min-width: 0;
    padding: 8px 10px 8px 0;
  }
  .group-title {
    font-size: 13px;
    font-weight: 600;
    color: #e2e8f0;
  }
  .group-preview {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }
  .group-close {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.3);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 2;
  }
  .group-item:hover .group-close { opacity: 1; }
  .group-close:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  /* ── Остальные стили ── */
  .color-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    border-radius: 10px 0 0 10px;
    z-index: 1;
  }
  .avatar-wrap {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    margin: 0 10px;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
  }
  .notif-item.expanded .avatar-wrap {
    margin-top: 18px;
  }
  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .text-wrap {
    flex: 1;
    min-width: 0;
    padding: 10px 10px 10px 0;
  }
  .sender {
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    padding-right: 50px;
  }
  /* v0.62.5: messenger-name над аватаркой, padding-top увеличен */
  .messenger-name {
    position: absolute;
    top: 2px;
    left: 10px;
    font-size: 10px;
    font-weight: 600;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    z-index: 1;
  }
  .notif-item.has-mname {
    padding-top: 14px;
  }
  .body-text {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    margin-top: 2px;
  }
  .notif-item.expanded .body-text {
    white-space: pre-wrap;
    overflow: visible;
    text-overflow: unset;
    max-height: 300px;
    overflow-y: auto;
    color: rgba(255,255,255,0.8);
  }
  .action-btn {
    padding: 4px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .action-btn.go-chat {
    background: rgba(42,171,238,0.15);
    border-color: rgba(42,171,238,0.3);
    color: #5bc0f8;
  }
  .action-btn.go-chat:hover {
    background: rgba(42,171,238,0.25);
  }
  .action-btn.mark-read {
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.25);
    color: #4ade80;
  }
  .action-btn.mark-read:hover {
    background: rgba(34,197,94,0.22);
  }
  .expand-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 3px;
    display: none;
  }
  .expand-hint.visible {
    display: block;
  }
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 5px;
    right: 0;
    height: 2px;
    border-radius: 0 0 10px 0;
    transform-origin: right;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  /* v0.62.0: единая кнопка закрытия (×) справа сверху — всегда видна */
  .close-btn {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 22px;
    height: 22px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    line-height: 1;
    opacity: 1;
    transition: all 0.15s;
    z-index: 2;
  }
  .close-btn:hover {
    background: rgba(239,68,68,0.3);
    border-color: rgba(239,68,68,0.4);
    color: #f87171;
    transform: scale(1.1);
  }
</style>
</head>
<body>
<div id="container"></div>
<script>
  const MAX_ITEMS = 6
  const container = document.getElementById('container')
  const items = new Map() // id → { el, timer, expanded, remainingMs, startTs, dismissMs, paused }
  // v0.60.4: группировка — { messengerId → { el, ids: [id,...], count, lastBody, color } }
  const groups = new Map()
  let groupingEnabled = false
  let hoveredItemId = null
  // v0.60.6: каскадное появление — очередь задержки
  let cascadeQueue = 0
  let cascadeTimer = null

  function calcHeight() {
    let h = 0
    for (const child of container.children) {
      // Пропускаем элементы в процессе dismiss (opacity=0 или height=0)
      if (child.style.pointerEvents === 'none') continue
      const ch = child.offsetHeight
      if (ch > 0) h += ch + 4
    }
    return h > 0 ? h + 4 : 0
  }

  function reportHeight() {
    setTimeout(() => {
      window.notifApi.resize(calcHeight())
    }, 60)
  }

  // ── Per-item hover (v0.60.3) ──
  function pauseItem(item) {
    if (item.paused || !item.dismissMs || item.dismissMs <= 0) return
    item.remainingMs -= (Date.now() - item.startTs)
    if (item.remainingMs < 0) item.remainingMs = 0
    clearTimeout(item.timer)
    item.timer = null
    item.paused = true
    const progress = item.el.querySelector('.progress-bar')
    if (progress) progress.style.animationPlayState = 'paused'
    item.el.classList.add('hovered')
  }

  function resumeItem(item) {
    if (!item.paused || !item.dismissMs || item.dismissMs <= 0) return
    item.paused = false
    item.startTs = Date.now()
    const progress = item.el.querySelector('.progress-bar')
    if (progress) progress.style.animationPlayState = 'running'
    const id = item.el.dataset.id
    item.timer = setTimeout(() => dismissItem(id, false), item.remainingMs || 3000)
    item.el.classList.remove('hovered')
  }

  container.addEventListener('mousemove', (e) => {
    const target = e.target.closest('.notif-item, .group-item')
    const newId = target ? target.dataset.id : null
    if (newId === hoveredItemId) return
    if (hoveredItemId) {
      const oldItem = items.get(hoveredItemId)
      if (oldItem) resumeItem(oldItem)
      // Группы: снять подсветку
      const oldGrp = target ? null : document.querySelector('.group-item.hovered')
      if (oldGrp) oldGrp.classList.remove('hovered')
    }
    hoveredItemId = newId
    if (newId) {
      const newItem = items.get(newId)
      if (newItem) pauseItem(newItem)
      // Группы: подсветка
      if (target && target.classList.contains('group-item')) target.classList.add('hovered')
    }
  })

  container.addEventListener('mouseleave', () => {
    if (hoveredItemId) {
      const item = items.get(hoveredItemId)
      if (item) resumeItem(item)
      hoveredItemId = null
    }
    // Снять hover со всех групп
    container.querySelectorAll('.group-item.hovered').forEach(g => g.classList.remove('hovered'))
  })

  // ── v0.60.5: Dismiss через inline transitions — БЕЗ мигания ──
  function dismissItem(id, fromMain) {
    const item = items.get(id)
    if (!item) return
    if (item.dismissing) return
    item.dismissing = true
    clearTimeout(item.timer)
    if (hoveredItemId === id) hoveredItemId = null
    if (!fromMain) window.notifApi.dismiss(id)

    const el = item.el
    const h = el.offsetHeight

    // Замораживаем текущее состояние — отменяем slideIn, ставим конечные значения
    el.style.animation = 'none'
    el.style.opacity = '1'
    el.style.transform = 'translateX(0) scale(1)'
    el.style.height = h + 'px'
    el.style.overflow = 'hidden'
    el.style.pointerEvents = 'none'

    // Force reflow — чтобы браузер применил стили выше ДО начала transition
    void el.offsetHeight

    // Этап 1: fade + slide вправо (250мс)
    el.style.transition = 'opacity 250ms ease-out, transform 250ms ease-out'
    el.style.opacity = '0'
    el.style.transform = 'translateX(80px) scale(0.95)'

    // Этап 2: пауза 80мс → коллапс высоты 180мс (v0.60.6: естественная задержка)
    setTimeout(() => {
      el.style.transition = 'height 180ms ease-in-out, min-height 180ms ease-in-out, margin-bottom 180ms ease-in-out'
      el.style.height = '0'
      el.style.minHeight = '0'
      el.style.marginBottom = '-4px'
      reportHeight()

      // Этап 3: удаление из DOM
      setTimeout(() => {
        el.remove()
        items.delete(id)
        if (groupingEnabled) updateGroup(item.messengerId)
        reportHeight()
      }, 190)
    }, 330)
  }

  function toggleExpand(data, el) {
    const item = items.get(data.id)
    if (!item) return
    const isExpanded = el.classList.toggle('expanded')
    item.expanded = isExpanded

    if (isExpanded && item.dismissMs > 0) {
      item.remainingMs -= (Date.now() - item.startTs)
      if (item.remainingMs < 0) item.remainingMs = 0
      clearTimeout(item.timer)
      item.timer = null
      item.paused = true
      const progress = el.querySelector('.progress-bar')
      if (progress) progress.style.animationPlayState = 'paused'
    } else if (!isExpanded && item.dismissMs > 0) {
      item.paused = false
      item.startTs = Date.now()
      const progress = el.querySelector('.progress-bar')
      if (progress) progress.style.animationPlayState = 'running'
      item.timer = setTimeout(() => dismissItem(data.id, false), item.remainingMs || 3000)
    }

    reportHeight()
    setTimeout(reportHeight, 220)
  }

  // ── v0.60.4: Группировка уведомлений ──
  function updateGroup(messengerId) {
    if (!messengerId) return
    // Считаем активные items от этого мессенджера
    const mItems = []
    items.forEach((item, id) => {
      if (item.messengerId === messengerId) mItems.push({ id, item })
    })

    const grp = groups.get(messengerId)
    if (mItems.length < 2) {
      // Менее 2 — убираем группу
      if (grp) {
        removeGroupEl(grp)
        groups.delete(messengerId)
      }
      return
    }

    if (!grp) {
      // Создаём группу
      createGroup(messengerId, mItems)
    } else {
      // Обновляем счётчик
      grp.count = mItems.length
      grp.ids = mItems.map(m => m.id)
      const counter = grp.el.querySelector('.group-counter')
      if (counter) counter.textContent = mItems.length
      const preview = grp.el.querySelector('.group-preview')
      if (preview) {
        const lastItem = mItems[mItems.length - 1].item
        preview.textContent = (lastItem.senderName || '') + ': ' + (lastItem.bodyText || '')
      }
    }
  }

  function createGroup(messengerId, mItems) {
    const first = mItems[0].item
    const last = mItems[mItems.length - 1].item
    const color = first.color || '#2AABEE'

    const el = document.createElement('div')
    el.className = 'group-item'
    el.dataset.id = 'group_' + messengerId
    el.dataset.messengerId = messengerId

    const bar = document.createElement('div')
    bar.className = 'color-bar'
    bar.style.background = color
    el.appendChild(bar)

    const counter = document.createElement('div')
    counter.className = 'group-counter'
    counter.style.background = color + '44'
    counter.textContent = mItems.length
    el.appendChild(counter)

    const textWrap = document.createElement('div')
    textWrap.className = 'group-text'

    const title = document.createElement('div')
    title.className = 'group-title'
    title.textContent = (first.messengerName || 'Мессенджер') + ': ' + mItems.length + ' новых'
    textWrap.appendChild(title)

    const preview = document.createElement('div')
    preview.className = 'group-preview'
    preview.textContent = (last.senderName || '') + ': ' + (last.bodyText || '')
    textWrap.appendChild(preview)

    el.appendChild(textWrap)

    const closeBtn = document.createElement('button')
    closeBtn.className = 'group-close'
    closeBtn.textContent = '\u00d7'
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      // Dismiss all items in group
      const grp = groups.get(messengerId)
      if (grp) {
        grp.ids.forEach(id => dismissItem(id, false))
      }
    })
    el.appendChild(closeBtn)

    // Клик на группу → развернуть все items
    el.addEventListener('click', () => {
      const grp = groups.get(messengerId)
      if (grp) {
        removeGroupEl(grp)
        groups.delete(messengerId)
        // Показать все скрытые items
        grp.ids.forEach(id => {
          const item = items.get(id)
          if (item && item.el) item.el.style.display = ''
        })
        reportHeight()
        setTimeout(reportHeight, 100)
      }
    })

    // Вставляем группу ПЕРЕД первым item этого мессенджера
    const firstEl = first.el
    container.insertBefore(el, firstEl)

    // Скрываем индивидуальные items
    mItems.forEach(m => { m.item.el.style.display = 'none' })

    groups.set(messengerId, {
      el,
      ids: mItems.map(m => m.id),
      count: mItems.length,
      messengerId,
      color
    })

    reportHeight()
  }

  function removeGroupEl(grp) {
    const el = grp.el
    const h = el.offsetHeight
    el.style.animation = 'none'
    el.style.opacity = '1'
    el.style.transform = 'translateX(0) scale(1)'
    el.style.height = h + 'px'
    el.style.overflow = 'hidden'
    el.style.pointerEvents = 'none'
    void el.offsetHeight
    el.style.transition = 'opacity 250ms ease-out, transform 250ms ease-out'
    el.style.opacity = '0'
    el.style.transform = 'translateX(80px) scale(0.95)'
    setTimeout(() => {
      el.style.transition = 'height 180ms ease-in-out, min-height 180ms ease-in-out, margin-bottom 180ms ease-in-out'
      el.style.height = '0'
      el.style.minHeight = '0'
      el.style.marginBottom = '-4px'
      setTimeout(() => { el.remove(); reportHeight() }, 190)
    }, 330)
  }

  // v0.60.7: мгновенное удаление для FIFO (без анимации)
  function forceRemoveItem(id) {
    const item = items.get(id)
    if (!item) return
    clearTimeout(item.timer)
    item.el.remove()
    items.delete(id)
    window.notifApi.dismiss(id)
  }

  function addNotification(data) {
    if (items.has(data.id)) {
      forceRemoveItem(data.id)
    }

    while (items.size >= MAX_ITEMS) {
      const firstKey = items.keys().next().value
      forceRemoveItem(firstKey)
    }

    // v0.60.4: сохраняем флаг группировки
    if (data.grouping !== undefined) groupingEnabled = !!data.grouping

    const hasFullBody = data.fullBody && data.fullBody.length > (data.body || '').length

    const el = document.createElement('div')
    el.className = 'notif-item'
    el.dataset.id = data.id

    // v0.62.5: название мессенджера над аватаркой слева + padding
    const mName = data.messengerName || ''
    if (mName) {
      el.classList.add('has-mname')
      const mNameEl = document.createElement('div')
      mNameEl.className = 'messenger-name'
      mNameEl.textContent = mName
      el.appendChild(mNameEl)
    }

    const bar = document.createElement('div')
    bar.className = 'color-bar'
    bar.style.background = data.color || '#2AABEE'
    el.appendChild(bar)

    const avWrap = document.createElement('div')
    avWrap.className = 'avatar-wrap'
    avWrap.style.background = (data.color || '#2AABEE') + '33'
    if (data.iconDataUrl) {
      const img = document.createElement('img')
      img.src = data.iconDataUrl
      img.onerror = () => { img.remove(); avWrap.textContent = data.emoji || '\u{1F4AC}' }
      avWrap.appendChild(img)
    } else {
      avWrap.textContent = data.emoji || '\u{1F4AC}'
    }
    el.appendChild(avWrap)

    const textWrap = document.createElement('div')
    textWrap.className = 'text-wrap'
    const sender = document.createElement('div')
    sender.className = 'sender'
    const senderName = data.title || ''
    sender.textContent = senderName || mName
    textWrap.appendChild(sender)

    const bodyText = document.createElement('div')
    bodyText.className = 'body-text'
    bodyText.textContent = data.body || ''
    bodyText.dataset.short = data.body || ''
    bodyText.dataset.full = data.fullBody || data.body || ''
    textWrap.appendChild(bodyText)

    const hint = document.createElement('div')
    hint.className = 'expand-hint visible'
    hint.textContent = hasFullBody ? '\u25BC ещё...' : '\u25BC действия'
    textWrap.appendChild(hint)

    const actionRow = document.createElement('div')
    actionRow.className = 'action-row'

    const goBtn = document.createElement('button')
    goBtn.className = 'action-btn go-chat'
    goBtn.textContent = '\u2192 Перейти к чату'
    goBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      window.notifApi.click(data.id)
      dismissItem(data.id, false)
    })
    actionRow.appendChild(goBtn)

    const readBtn2 = document.createElement('button')
    readBtn2.className = 'action-btn mark-read'
    readBtn2.textContent = '\u2713 Прочитано'
    readBtn2.addEventListener('click', (e) => {
      e.stopPropagation()
      window.notifApi.markRead(data.id)
      // v0.62.1: визуальное подтверждение — кнопка зеленеет, потом dismiss
      readBtn2.textContent = '\u2713 Готово!'
      readBtn2.style.background = 'rgba(34,197,94,0.35)'
      readBtn2.style.color = '#4ade80'
      readBtn2.style.borderColor = 'rgba(34,197,94,0.5)'
      readBtn2.style.pointerEvents = 'none'
      setTimeout(() => dismissItem(data.id, false), 800)
    })
    actionRow.appendChild(readBtn2)

    textWrap.appendChild(actionRow)
    el.appendChild(textWrap)

    // v0.62.0: единая кнопка закрытия (×) справа сверху — убрана зелёная галочка
    const closeBtn = document.createElement('button')
    closeBtn.className = 'close-btn'
    closeBtn.textContent = '\u00d7'
    closeBtn.title = '\u0417\u0430\u043A\u0440\u044B\u0442\u044C'
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      dismissItem(data.id, false)
    })
    el.appendChild(closeBtn)

    const progress = document.createElement('div')
    progress.className = 'progress-bar'
    progress.style.background = data.color || '#2AABEE'
    el.appendChild(progress)

    el.addEventListener('click', (e) => {
      toggleExpand(data, el)
      const bText = el.querySelector('.body-text')
      const hintEl = el.querySelector('.expand-hint')
      if (el.classList.contains('expanded')) {
        if (hasFullBody && bText) bText.textContent = bText.dataset.full
        if (hintEl) hintEl.textContent = '\u25B2 свернуть'
      } else {
        if (hasFullBody && bText) bText.textContent = bText.dataset.short
        if (hintEl) hintEl.textContent = hasFullBody ? '\u25BC ещё...' : '\u25BC действия'
      }
    })

    // v0.60.7: каскад — макс 5 слотов × 100мс, потом без задержки
    const cascadeDelay = Math.min(cascadeQueue, 5) * 100
    if (cascadeDelay > 0) {
      el.style.animationDelay = cascadeDelay + 'ms'
      el.style.animationFillMode = 'backwards'
    }
    cascadeQueue++
    clearTimeout(cascadeTimer)
    cascadeTimer = setTimeout(() => { cascadeQueue = 0 }, 600)

    container.appendChild(el)

    const thisDismissMs = data.dismissMs
    let timer = null
    const startTs = Date.now()

    if (thisDismissMs > 0) {
      requestAnimationFrame(() => {
        progress.style.animation = 'shrink ' + (thisDismissMs / 1000) + 's linear forwards'
      })
      // v0.60.4: ВСЕГДА запускаем таймер, даже при expandedByDefault
      timer = setTimeout(() => dismissItem(data.id, false), thisDismissMs)
    } else {
      progress.style.display = 'none'
    }

    // Автораскрытие (визуально) — таймер УЖЕ запущен
    if (data.expandedByDefault) {
      el.classList.add('expanded')
      if (hasFullBody) {
        const bText = el.querySelector('.body-text')
        if (bText) bText.textContent = bText.dataset.full
      }
      const hintEl = el.querySelector('.expand-hint')
      if (hintEl) hintEl.textContent = '\u25B2 свернуть'
    }

    items.set(data.id, {
      el, timer,
      expanded: !!data.expandedByDefault,
      remainingMs: thisDismissMs,
      startTs,
      dismissMs: thisDismissMs,
      paused: false,
      messengerId: data.messengerId || '',
      messengerName: data.messengerName || '',
      senderName: data.title || '',
      bodyText: data.body || '',
      color: data.color || '#2AABEE'
    })

    reportHeight()

    // v0.60.4: проверяем группировку
    if (groupingEnabled && data.messengerId) {
      // Считаем сколько items от этого мессенджера
      let mCount = 0
      items.forEach(item => { if (item.messengerId === data.messengerId) mCount++ })
      if (mCount >= 2) updateGroup(data.messengerId)
    }
  }

  // IPC listeners
  window.notifApi.onNotification((data) => addNotification(data))
  window.notifApi.onDismiss((id) => dismissItem(id, true))
</script>
</body>
</html>
