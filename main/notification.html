<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }
  #container {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 4px;
  }
  .notif-item {
    display: flex;
    align-items: center;
    min-height: 76px;
    background: #1a1a2e;
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transform: translateX(380px);
    opacity: 0;
    animation: slideIn 300ms cubic-bezier(0.22, 1, 0.36, 1) forwards;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  /* v0.60.3: подсветка при hover — визуальный индикатор "таймер на паузе" */
  .notif-item.hovered {
    border-color: rgba(255,255,255,0.18);
    box-shadow: 0 4px 24px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .notif-item.expanded {
    align-items: flex-start;
    cursor: default;
  }
  /* Плавная анимация action-row при expand/collapse */
  .action-row {
    display: flex;
    gap: 6px;
    max-height: 0;
    overflow: hidden;
    transition: max-height 200ms ease-out, margin-top 200ms ease-out, opacity 200ms ease-out;
    opacity: 0;
    margin-top: 0;
  }
  .notif-item.expanded .action-row {
    max-height: 60px;
    opacity: 1;
    margin-top: 8px;
  }
  /* v0.60.3: плавная анимация закрытия — fade + scale + slide */
  .notif-item.removing {
    animation: dismissOut 350ms cubic-bezier(0.4, 0, 1, 1) forwards;
    pointer-events: none;
  }
  @keyframes slideIn {
    0%   { transform: translateX(380px) scale(0.95); opacity: 0; }
    70%  { transform: translateX(-8px) scale(1); opacity: 1; }
    100% { transform: translateX(0) scale(1); opacity: 1; }
  }
  /* v0.60.3: красивый dismiss — сдвиг вправо + уменьшение + затухание */
  @keyframes dismissOut {
    0%   { transform: translateX(0) scale(1); opacity: 1; }
    40%  { transform: translateX(20px) scale(0.97); opacity: 0.7; }
    100% { transform: translateX(120px) scale(0.9); opacity: 0; max-height: 0; margin-bottom: -4px; }
  }
  .color-bar {
    width: 5px;
    align-self: stretch;
    flex-shrink: 0;
    border-radius: 10px 0 0 10px;
  }
  .avatar-wrap {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    margin: 0 10px;
    flex-shrink: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    color: #fff;
  }
  .notif-item.expanded .avatar-wrap {
    margin-top: 16px;
  }
  .avatar-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .text-wrap {
    flex: 1;
    min-width: 0;
    padding: 10px 10px 10px 0;
  }
  .sender {
    font-size: 14px;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    padding-right: 50px;
  }
  .messenger-name {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.5;
  }
  .body-text {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
    margin-top: 2px;
  }
  .notif-item.expanded .body-text {
    white-space: pre-wrap;
    overflow: visible;
    text-overflow: unset;
    max-height: 300px;
    overflow-y: auto;
    color: rgba(255,255,255,0.8);
  }
  /* Кнопки действий */
  .action-btn {
    padding: 4px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
  }
  .action-btn.go-chat {
    background: rgba(42,171,238,0.15);
    border-color: rgba(42,171,238,0.3);
    color: #5bc0f8;
  }
  .action-btn.go-chat:hover {
    background: rgba(42,171,238,0.25);
  }
  .action-btn.mark-read {
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.25);
    color: #4ade80;
  }
  .action-btn.mark-read:hover {
    background: rgba(34,197,94,0.22);
  }
  /* Кнопка развернуть */
  .expand-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 3px;
    display: none;
  }
  .expand-hint.visible {
    display: block;
  }
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 5px;
    right: 0;
    height: 2px;
    border-radius: 0 0 10px 0;
    transform-origin: right;
  }
  @keyframes shrink {
    from { transform: scaleX(1); }
    to   { transform: scaleX(0); }
  }
  .close-btn {
    position: absolute;
    top: 4px;
    right: 6px;
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.3);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    line-height: 1;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 2;
  }
  .read-btn {
    position: absolute;
    top: 4px;
    right: 28px;
    width: 24px;
    height: 24px;
    border: 1px solid rgba(34,197,94,0.4);
    background: rgba(34,197,94,0.2);
    color: #4ade80;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    line-height: 1;
    opacity: 1;
    transition: all 0.15s;
    z-index: 2;
  }
  .notif-item:hover .close-btn,
  .notif-item.hovered .close-btn {
    opacity: 1;
  }
  .close-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
  }
  .read-btn:hover {
    background: rgba(34,197,94,0.25);
    color: #4ade80;
    transform: scale(1.1);
  }
</style>
</head>
<body>
<div id="container"></div>
<script>
  const MAX_ITEMS = 6
  const DEFAULT_DISMISS_MS = 5000
  const container = document.getElementById('container')
  const items = new Map() // id → { el, timer, expanded, remainingMs, startTs, dismissMs, paused }

  // v0.60.3: Отслеживание hover на уровне контейнера — решает проблему
  // когда Windows с transparent+focusable:false окном шлёт mouseenter на ВСЕ элементы
  let hoveredItemId = null

  function calcHeight() {
    let h = 0
    for (const child of container.children) {
      if (!child.classList.contains('removing')) {
        h += child.offsetHeight + 4
      }
    }
    return h > 0 ? h + 4 : 0
  }

  function reportHeight() {
    // setTimeout вместо rAF — rAF НЕ работает в hidden BrowserWindow!
    // 60ms достаточно для стабильного layout без дёрга
    setTimeout(() => {
      window.notifApi.resize(calcHeight())
    }, 60)
  }

  // v0.60.3: Пауза таймера конкретного уведомления
  function pauseItem(item) {
    if (item.paused || !item.dismissMs || item.dismissMs <= 0) return
    if (item.expanded) return // expanded уже на паузе
    item.remainingMs -= (Date.now() - item.startTs)
    if (item.remainingMs < 0) item.remainingMs = 0
    clearTimeout(item.timer)
    item.timer = null
    item.paused = true
    const progress = item.el.querySelector('.progress-bar')
    if (progress) progress.style.animationPlayState = 'paused'
    item.el.classList.add('hovered')
  }

  // v0.60.3: Возобновление таймера конкретного уведомления
  function resumeItem(item) {
    if (!item.paused || !item.dismissMs || item.dismissMs <= 0) return
    if (item.expanded) return // expanded остаётся на паузе
    item.paused = false
    item.startTs = Date.now()
    const progress = item.el.querySelector('.progress-bar')
    if (progress) progress.style.animationPlayState = 'running'
    const id = item.el.dataset.id
    item.timer = setTimeout(() => dismissItem(id, false), item.remainingMs || 3000)
    item.el.classList.remove('hovered')
  }

  // v0.60.3: Единый mousemove на контейнере — определяем какой item под курсором
  container.addEventListener('mousemove', (e) => {
    const target = e.target.closest('.notif-item')
    const newId = target ? target.dataset.id : null

    if (newId === hoveredItemId) return // курсор на том же элементе
    // Снимаем паузу со старого
    if (hoveredItemId) {
      const oldItem = items.get(hoveredItemId)
      if (oldItem) resumeItem(oldItem)
    }
    // Ставим паузу на новый
    hoveredItemId = newId
    if (newId) {
      const newItem = items.get(newId)
      if (newItem) pauseItem(newItem)
    }
  })

  // v0.60.3: Курсор ушёл с окна — снимаем все паузы
  container.addEventListener('mouseleave', () => {
    if (hoveredItemId) {
      const item = items.get(hoveredItemId)
      if (item) resumeItem(item)
      hoveredItemId = null
    }
  })

  function dismissItem(id, fromMain) {
    const item = items.get(id)
    if (!item) return
    clearTimeout(item.timer)
    item.el.classList.add('removing')
    if (hoveredItemId === id) hoveredItemId = null
    if (!fromMain) window.notifApi.dismiss(id)
    // v0.60.3: увеличенная задержка под новую анимацию (350ms)
    setTimeout(() => {
      item.el.remove()
      items.delete(id)
      reportHeight()
    }, 360)
  }

  function toggleExpand(data, el) {
    const item = items.get(data.id)
    if (!item) return
    const isExpanded = el.classList.toggle('expanded')
    item.expanded = isExpanded

    // Приостановить/возобновить таймер при раскрытии
    if (isExpanded && item.dismissMs > 0) {
      item.remainingMs -= (Date.now() - item.startTs)
      if (item.remainingMs < 0) item.remainingMs = 0
      clearTimeout(item.timer)
      item.timer = null
      item.paused = true
      const progress = el.querySelector('.progress-bar')
      if (progress) progress.style.animationPlayState = 'paused'
    } else if (!isExpanded && item.dismissMs > 0) {
      item.paused = false
      const progress = el.querySelector('.progress-bar')
      if (progress) progress.style.animationPlayState = 'running'
      item.startTs = Date.now()
      item.timer = setTimeout(() => dismissItem(data.id, false), item.remainingMs || 3000)
    }

    // Вызываем reportHeight сразу + после transition (200ms) для точной высоты
    reportHeight()
    setTimeout(reportHeight, 220)
  }

  function addNotification(data) {
    // { id, title, body, fullBody, iconDataUrl, color, emoji, messengerName, messengerId, dismissMs }
    if (items.has(data.id)) {
      const old = items.get(data.id)
      clearTimeout(old.timer)
      old.el.remove()
      items.delete(data.id)
    }

    while (items.size >= MAX_ITEMS) {
      const firstKey = items.keys().next().value
      dismissItem(firstKey, false)
    }

    const hasFullBody = data.fullBody && data.fullBody.length > (data.body || '').length

    const el = document.createElement('div')
    el.className = 'notif-item'
    el.dataset.id = data.id

    // Color bar
    const bar = document.createElement('div')
    bar.className = 'color-bar'
    bar.style.background = data.color || '#2AABEE'
    el.appendChild(bar)

    // Avatar
    const avWrap = document.createElement('div')
    avWrap.className = 'avatar-wrap'
    avWrap.style.background = (data.color || '#2AABEE') + '33'
    if (data.iconDataUrl) {
      const img = document.createElement('img')
      img.src = data.iconDataUrl
      img.onerror = () => { img.remove(); avWrap.textContent = data.emoji || '\u{1F4AC}' }
      avWrap.appendChild(img)
    } else {
      avWrap.textContent = data.emoji || '\u{1F4AC}'
    }
    el.appendChild(avWrap)

    // Text
    const textWrap = document.createElement('div')
    textWrap.className = 'text-wrap'
    const sender = document.createElement('div')
    sender.className = 'sender'
    const senderName = data.title || ''
    const mName = data.messengerName || ''
    sender.innerHTML = senderName
      ? senderName + ' <span class="messenger-name">' + mName + '</span>'
      : mName
    textWrap.appendChild(sender)

    const bodyText = document.createElement('div')
    bodyText.className = 'body-text'
    bodyText.textContent = data.body || ''
    bodyText.dataset.short = data.body || ''
    bodyText.dataset.full = data.fullBody || data.body || ''
    textWrap.appendChild(bodyText)

    // Подсказка: "ещё..." для длинных, "▼ действия" для всех
    const hint = document.createElement('div')
    hint.className = 'expand-hint visible'
    hint.textContent = hasFullBody ? '\u25BC ещё...' : '\u25BC действия'
    textWrap.appendChild(hint)

    // Кнопки действий (видны только в expanded)
    const actionRow = document.createElement('div')
    actionRow.className = 'action-row'

    const goBtn = document.createElement('button')
    goBtn.className = 'action-btn go-chat'
    goBtn.textContent = '\u2192 Перейти к чату'
    goBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      window.notifApi.click(data.id)
      dismissItem(data.id, false)
    })
    actionRow.appendChild(goBtn)

    const readBtn2 = document.createElement('button')
    readBtn2.className = 'action-btn mark-read'
    readBtn2.textContent = '\u2713 Прочитано'
    readBtn2.addEventListener('click', (e) => {
      e.stopPropagation()
      window.notifApi.markRead(data.id)
      dismissItem(data.id, false)
    })
    actionRow.appendChild(readBtn2)

    textWrap.appendChild(actionRow)
    el.appendChild(textWrap)

    // Кнопка "Прочитано" (✓) — всегда видна при hover, рядом с крестиком
    const readBtn = document.createElement('button')
    readBtn.className = 'read-btn'
    readBtn.textContent = '\u2713'
    readBtn.title = '\u041F\u0440\u043E\u0447\u0438\u0442\u0430\u043D\u043E'
    readBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      window.notifApi.markRead(data.id)
      dismissItem(data.id, false)
    })
    el.appendChild(readBtn)

    // Close button
    const closeBtn = document.createElement('button')
    closeBtn.className = 'close-btn'
    closeBtn.textContent = '\u00d7'
    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation()
      dismissItem(data.id, false)
    })
    el.appendChild(closeBtn)

    // Progress bar
    const progress = document.createElement('div')
    progress.className = 'progress-bar'
    progress.style.background = data.color || '#2AABEE'
    el.appendChild(progress)

    // Клик на уведомление — ВСЕГДА раскрывает (кнопки действий видны)
    // Если есть fullBody — показывает полный текст
    // Повторный клик — сворачивает
    el.addEventListener('click', (e) => {
      toggleExpand(data, el)
      const bText = el.querySelector('.body-text')
      const hintEl = el.querySelector('.expand-hint')
      if (el.classList.contains('expanded')) {
        if (hasFullBody && bText) bText.textContent = bText.dataset.full
        if (hintEl) hintEl.textContent = '\u25B2 свернуть'
      } else {
        if (hasFullBody && bText) bText.textContent = bText.dataset.short
        if (hintEl) hintEl.textContent = hasFullBody ? '\u25BC ещё...' : '\u25BC действия'
      }
    })

    container.appendChild(el)

    const thisDismissMs = data.dismissMs
    let timer = null
    const startTs = Date.now()

    if (thisDismissMs > 0) {
      requestAnimationFrame(() => {
        progress.style.animation = 'shrink ' + (thisDismissMs / 1000) + 's linear forwards'
      })

      // При expandedByDefault — не запускаем таймер (пауза с первой секунды)
      if (!data.expandedByDefault) {
        timer = setTimeout(() => dismissItem(data.id, false), thisDismissMs)
      } else {
        progress.style.animationPlayState = 'paused'
      }
    } else {
      progress.style.display = 'none'
    }

    // Автораскрытие ПОСЛЕ настройки таймера
    if (data.expandedByDefault) {
      el.classList.add('expanded')
      if (hasFullBody) {
        const bText = el.querySelector('.body-text')
        if (bText) bText.textContent = bText.dataset.full
      }
      const hintEl = el.querySelector('.expand-hint')
      if (hintEl) hintEl.textContent = '\u25B2 свернуть'
    }

    // v0.60.3: Всё состояние хранится в Map — не в closure
    items.set(data.id, {
      el, timer,
      expanded: !!data.expandedByDefault,
      remainingMs: thisDismissMs,
      startTs,
      dismissMs: thisDismissMs,
      paused: !!data.expandedByDefault
    })
    reportHeight()
  }

  // IPC listeners
  window.notifApi.onNotification((data) => addNotification(data))
  window.notifApi.onDismiss((id) => dismissItem(id, true))
</script>
</body>
</html>
