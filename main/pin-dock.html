<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="pin-dock.css">
</head>
<body>
<div id="dock-wrapper">
  <div id="dock">
    <div class="dock-drag">
      <span class="dock-label">📌</span>
      <span class="dock-count zero" id="countLabel">0</span>
      <span class="cat-counts" id="catCounts">
        <span class="cat-badge urgent hidden" id="catUrgent">0</span>
        <span class="cat-badge work hidden" id="catWork">0</span>
        <span class="cat-badge later hidden" id="catLater">0</span>
      </span>
    </div>
    <span class="dock-empty" id="emptyLabel">нет задач</span>
    <button class="dock-close" id="dockCloseBtn" title="Скрыть панель">×</button>
  </div>
</div>
<script src="pin-dock.js"></script>
</body>
</html>
