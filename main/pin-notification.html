<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    overflow: hidden;
    -webkit-app-region: no-drag;
  }
  .pin-card {
    background: #1a1a2e;
    border-radius: 10px;
    border: 1px solid rgba(99,102,241,0.3);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(99,102,241,0.15);
    overflow: hidden;
    position: relative;
    animation: pinAppear 250ms ease-out;
  }
  @keyframes pinAppear {
    0%   { opacity: 0; transform: scale(0.92); }
    100% { opacity: 1; transform: scale(1); }
  }
  /* v0.66.0: мигание при истечении таймера */
  .pin-card.timer-alert {
    animation: cardFlash 600ms ease-in-out infinite;
    border-color: rgba(239,68,68,0.5);
  }
  @keyframes cardFlash {
    0%, 100% { box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 0 1px rgba(239,68,68,0.2); }
    50%      { box-shadow: 0 4px 20px rgba(239,68,68,0.3), 0 0 0 2px rgba(239,68,68,0.5); }
  }
  .color-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    border-radius: 10px 0 0 10px;
  }
  .pin-header {
    display: flex;
    align-items: center;
    padding: 8px 10px 6px 14px;
    -webkit-app-region: drag;
    cursor: grab;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .pin-indicator {
    font-size: 10px;
    margin-right: 6px;
    color: rgba(99,102,241,0.7);
  }
  .pin-sender {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: #e2e8f0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: text;
    -webkit-app-region: no-drag;
    cursor: text;
  }
  .pin-copy-name {
    -webkit-app-region: no-drag;
    width: 18px; height: 18px;
    border: none; background: transparent;
    color: rgba(255,255,255,0.2);
    font-size: 10px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    border-radius: 3px; flex-shrink: 0;
    transition: all 0.15s; opacity: 0;
  }
  .pin-header:hover .pin-copy-name { opacity: 1; }
  .pin-copy-name:hover { color: rgba(99,102,241,0.8); background: rgba(99,102,241,0.1); }
  .pin-copy-name.copied { color: #4ade80; }
  .pin-messenger {
    font-size: 9px;
    color: rgba(99,102,241,0.6);
    margin-left: 6px;
    flex-shrink: 0;
    font-weight: 500;
  }
  .pin-time {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-left: 6px;
    flex-shrink: 0;
  }
  .pin-close {
    -webkit-app-region: no-drag;
    width: 20px;
    height: 20px;
    border: none;
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.4);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    margin-left: 6px;
    transition: all 0.15s;
  }
  .pin-close:hover {
    background: rgba(239,68,68,0.2);
    color: #f87171;
  }
  .pin-body {
    padding: 8px 14px;
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 200px;
    overflow-y: auto;
    user-select: text;
    -webkit-app-region: no-drag;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.15) transparent;
  }
  .pin-body::-webkit-scrollbar { width: 3px; }
  .pin-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  .pin-body::-webkit-scrollbar-track { background: transparent; }
  /* v0.66.0: секция таймера */
  .timer-section {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-top: 1px solid rgba(255,255,255,0.04);
    -webkit-app-region: no-drag;
  }
  .timer-label {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-right: 2px;
  }
  .timer-btn {
    padding: 2px 8px;
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 4px;
    background: rgba(99,102,241,0.08);
    color: rgba(99,102,241,0.7);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timer-btn:hover {
    background: rgba(99,102,241,0.2);
    color: rgba(99,102,241,1);
  }
  .timer-countdown {
    display: none;
    align-items: center;
    gap: 6px;
    flex: 1;
  }
  .timer-countdown.active { display: flex; }
  .timer-remaining {
    font-size: 12px;
    font-weight: 600;
    color: rgba(99,102,241,0.9);
  }
  .timer-remaining.expired {
    color: #f87171;
  }
  .timer-cancel {
    padding: 1px 6px;
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 3px;
    background: transparent;
    color: rgba(239,68,68,0.6);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .timer-cancel:hover {
    background: rgba(239,68,68,0.15);
    color: #f87171;
  }
  .pin-footer {
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    padding: 6px 10px 8px;
    border-top: 1px solid rgba(255,255,255,0.06);
    -webkit-app-region: no-drag;
  }
  .pin-action {
    padding: 3px 10px;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 5px;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .pin-action:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .pin-action.dock {
    border-color: rgba(99,102,241,0.25);
    color: rgba(99,102,241,0.7);
  }
  .pin-action.dock:hover {
    background: rgba(99,102,241,0.15);
    color: rgba(99,102,241,1);
  }
  .pin-action.unpin {
    border-color: rgba(239,68,68,0.25);
    color: rgba(239,68,68,0.7);
  }
  .pin-action.unpin:hover {
    background: rgba(239,68,68,0.15);
    color: #f87171;
  }
  .pin-action.chat {
    border-color: rgba(56,189,248,0.25);
    color: rgba(56,189,248,0.7);
  }
  .pin-action.chat:hover {
    background: rgba(56,189,248,0.15);
    color: rgba(56,189,248,1);
  }
  .pin-action.copy {
    border-color: rgba(34,197,94,0.2);
    color: rgba(34,197,94,0.6);
  }
  .pin-action.copy:hover {
    background: rgba(34,197,94,0.12);
    color: #4ade80;
  }
  /* v0.72.0: мини-заметка */
  .note-section {
    padding: 4px 10px;
    border-top: 1px solid rgba(255,255,255,0.04);
    -webkit-app-region: no-drag;
  }
  .note-toggle {
    display: flex; align-items: center; gap: 4px;
    border: none; background: transparent;
    color: rgba(255,255,255,0.3); font-size: 10px;
    cursor: pointer; padding: 2px 0; transition: color 0.15s;
  }
  .note-toggle:hover { color: rgba(255,255,255,0.6); }
  .note-toggle.has-note { color: rgba(99,102,241,0.7); }
  .note-input {
    display: none; width: 100%; margin-top: 4px;
    padding: 4px 8px; border: 1px solid rgba(99,102,241,0.2);
    border-radius: 5px; background: rgba(0,0,0,0.3);
    color: rgba(255,255,255,0.85); font-size: 11px;
    font-family: inherit; line-height: 1.4; resize: none;
    outline: none; transition: border-color 0.15s;
  }
  .note-input:focus { border-color: rgba(99,102,241,0.5); }
  .note-input.visible { display: block; }
  .note-display {
    display: none; margin-top: 3px;
    font-size: 11px; color: rgba(255,255,255,0.5);
    line-height: 1.4; white-space: pre-wrap; word-break: break-word;
    max-height: 60px; overflow: hidden;
    font-style: italic;
  }
  .note-display.visible { display: block; }
  /* v0.70.0: категории */
  .category-section {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-top: 1px solid rgba(255,255,255,0.04);
    -webkit-app-region: no-drag;
  }
  .cat-label {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    margin-right: 2px;
  }
  .cat-btn {
    padding: 2px 8px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    background: transparent;
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .cat-btn:hover { opacity: 1; }
  .cat-btn.active {
    font-weight: 600;
  }
  .cat-btn.urgent { color: #f87171; border-color: rgba(239,68,68,0.3); }
  .cat-btn.urgent:hover { background: rgba(239,68,68,0.15); }
  .cat-btn.urgent.active { background: rgba(239,68,68,0.2); border-color: rgba(239,68,68,0.6); box-shadow: inset 0 0 0 1px rgba(239,68,68,0.4); }
  .cat-btn.work { color: #fbbf24; border-color: rgba(245,158,11,0.3); }
  .cat-btn.work:hover { background: rgba(245,158,11,0.15); }
  .cat-btn.work.active { background: rgba(245,158,11,0.2); border-color: rgba(245,158,11,0.6); box-shadow: inset 0 0 0 1px rgba(245,158,11,0.4); }
  .cat-btn.later { color: #4ade80; border-color: rgba(34,197,94,0.3); }
  .cat-btn.later:hover { background: rgba(34,197,94,0.15); }
  .cat-btn.later.active { background: rgba(34,197,94,0.2); border-color: rgba(34,197,94,0.6); box-shadow: inset 0 0 0 1px rgba(34,197,94,0.4); }
</style>
</head>
<body>
<div class="pin-card" id="card">
  <div class="color-bar" id="colorBar"></div>
  <div class="pin-header">
    <span class="pin-indicator">📌</span>
    <span class="pin-sender" id="sender"></span>
    <button class="pin-copy-name" id="copyNameBtn" title="Копировать ФИО">📋</button>
    <span class="pin-messenger" id="messengerName"></span>
    <span class="pin-time" id="time"></span>
    <button class="pin-close" id="closeBtn" title="Открепить">×</button>
  </div>
  <div class="pin-body" id="body"></div>
  <!-- v0.70.0: секция категорий -->
  <div class="category-section" id="categorySection">
    <span class="cat-label">🏷</span>
    <button class="cat-btn urgent" data-cat="urgent">🔴 Срочно</button>
    <button class="cat-btn work" data-cat="work">🟡 В работе</button>
    <button class="cat-btn later" data-cat="later">🟢 На потом</button>
  </div>
  <!-- v0.72.0: мини-заметка -->
  <div class="note-section" id="noteSection">
    <button class="note-toggle" id="noteToggle">📝 <span id="noteToggleLabel">Заметка</span></button>
    <div class="note-display" id="noteDisplay"></div>
    <textarea class="note-input" id="noteInput" rows="2" maxlength="200" placeholder="Краткая заметка к задаче..."></textarea>
  </div>
  <!-- v0.66.0: секция таймера -->
  <div class="timer-section" id="timerSection">
    <span class="timer-label">⏰</span>
    <div id="timerButtons">
      <button class="timer-btn" data-min="5">5м</button>
      <button class="timer-btn" data-min="15">15м</button>
      <button class="timer-btn" data-min="60">1ч</button>
    </div>
    <div class="timer-countdown" id="timerCountdown">
      <span class="timer-remaining" id="timerRemaining">00:00</span>
      <button class="timer-cancel" id="timerCancel">✕ Отмена</button>
    </div>
  </div>
  <div class="pin-footer">
    <button class="pin-action chat" id="chatBtn" style="display:none">→ В чат</button>
    <button class="pin-action copy" id="copyBtn">📋 Копировать</button>
    <button class="pin-action dock" id="dockBtn">⬇ Свернуть</button>
    <button class="pin-action unpin" id="unpinBtn">⊘ Открепить</button>
  </div>
</div>
<script>
  const card = document.getElementById('card')
  const colorBar = document.getElementById('colorBar')
  const senderEl = document.getElementById('sender')
  const timeEl = document.getElementById('time')
  const messengerNameEl = document.getElementById('messengerName')
  const bodyEl = document.getElementById('body')
  const closeBtn = document.getElementById('closeBtn')
  const chatBtn = document.getElementById('chatBtn')
  const copyBtn = document.getElementById('copyBtn')
  const dockBtn = document.getElementById('dockBtn')
  const unpinBtn = document.getElementById('unpinBtn')
  const timerButtons = document.getElementById('timerButtons')
  const timerCountdown = document.getElementById('timerCountdown')
  const timerRemaining = document.getElementById('timerRemaining')
  const timerCancel = document.getElementById('timerCancel')
  const copyNameBtn = document.getElementById('copyNameBtn')

  // Кнопка копирования ФИО
  copyNameBtn.addEventListener('click', (e) => {
    e.stopPropagation()
    const name = senderEl.textContent.trim()
    if (!name) return
    navigator.clipboard.writeText(name).then(() => {
      copyNameBtn.textContent = '✓'
      copyNameBtn.classList.add('copied')
      setTimeout(() => { copyNameBtn.textContent = '📋'; copyNameBtn.classList.remove('copied') }, 1500)
    }).catch(() => {})
  })

  const noteToggle = document.getElementById('noteToggle')
  const noteToggleLabel = document.getElementById('noteToggleLabel')
  const noteDisplay = document.getElementById('noteDisplay')
  const noteInput = document.getElementById('noteInput')
  let currentNote = ''
  let noteEditing = false

  // Переключение заметки: клик → показать/скрыть ввод
  noteToggle.addEventListener('click', () => {
    if (noteEditing) {
      // Сохранить и закрыть
      saveNote()
    } else {
      // Показать ввод
      noteDisplay.classList.remove('visible')
      noteInput.classList.add('visible')
      noteInput.value = currentNote
      noteInput.focus()
      noteEditing = true
      noteToggleLabel.textContent = 'Сохранить'
      requestAnimationFrame(() => window.pinApi.resize(card.offsetHeight))
    }
  })

  // Blur — сохранить при потере фокуса
  noteInput.addEventListener('blur', () => {
    // Небольшая задержка чтобы клик по кнопке "Сохранить" успел обработаться
    setTimeout(() => { if (noteEditing) saveNote() }, 150)
  })

  // Enter (без Shift) — сохранить
  noteInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); saveNote() }
    if (e.key === 'Escape') { cancelNote() }
  })

  function saveNote() {
    const text = noteInput.value.trim()
    currentNote = text
    noteEditing = false
    noteInput.classList.remove('visible')
    noteToggleLabel.textContent = 'Заметка'
    if (text) {
      noteDisplay.textContent = text
      noteDisplay.classList.add('visible')
      noteToggle.classList.add('has-note')
    } else {
      noteDisplay.classList.remove('visible')
      noteToggle.classList.remove('has-note')
    }
    window.pinApi.setNote(text)
    requestAnimationFrame(() => window.pinApi.resize(card.offsetHeight))
  }

  function cancelNote() {
    noteEditing = false
    noteInput.classList.remove('visible')
    noteToggleLabel.textContent = 'Заметка'
    if (currentNote) {
      noteDisplay.classList.add('visible')
    }
    requestAnimationFrame(() => window.pinApi.resize(card.offsetHeight))
  }

  let messageText = ''
  let pinMessengerId = ''
  let timerInterval = null

  window.pinApi.onData((data) => {
    senderEl.textContent = data.sender || ''
    messengerNameEl.textContent = data.messengerName || ''
    timeEl.textContent = data.time || ''
    bodyEl.textContent = data.text || ''
    messageText = data.text || ''
    colorBar.style.background = data.color || '#2AABEE'
    pinMessengerId = data.messengerId || ''
    // Показать кнопку "В чат" если есть messengerId
    if (pinMessengerId) chatBtn.style.display = ''
    // Загрузить заметку если есть
    if (data.note) {
      currentNote = data.note
      noteDisplay.textContent = currentNote
      noteDisplay.classList.add('visible')
      noteToggle.classList.add('has-note')
    }

    requestAnimationFrame(() => {
      window.pinApi.resize(card.offsetHeight)
    })
  })

  closeBtn.addEventListener('click', () => window.pinApi.unpin())
  unpinBtn.addEventListener('click', () => window.pinApi.unpin())
  dockBtn.addEventListener('click', () => window.pinApi.minimizeToDock())
  chatBtn.addEventListener('click', () => {
    if (pinMessengerId) window.pinApi.goToChat(pinMessengerId)
  })

  copyBtn.addEventListener('click', () => {
    if (navigator.clipboard && messageText) {
      navigator.clipboard.writeText(messageText).then(() => {
        copyBtn.textContent = '\u2713 \u0421\u043A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u043D\u043E'
        copyBtn.style.color = '#4ade80'
        copyBtn.style.borderColor = 'rgba(34,197,94,0.5)'
        setTimeout(() => {
          copyBtn.textContent = '\u{1F4CB} \u041A\u043E\u043F\u0438\u0440\u043E\u0432\u0430\u0442\u044C'
          copyBtn.style.color = ''
          copyBtn.style.borderColor = ''
        }, 1500)
      })
    }
  })

  // v0.66.0: кнопки таймера
  timerButtons.addEventListener('click', (e) => {
    const btn = e.target.closest('.timer-btn')
    if (!btn) return
    const minutes = parseInt(btn.dataset.min, 10)
    window.pinApi.startTimer(minutes)
  })

  timerCancel.addEventListener('click', () => {
    window.pinApi.cancelTimer()
    stopLocalTimer()
  })

  // Таймер запущен — получаем timerEnd и ведём обратный отсчёт
  window.pinApi.onTimerStarted((timerEnd) => {
    card.classList.remove('timer-alert')
    timerButtons.style.display = 'none'
    timerCountdown.classList.add('active')
    timerRemaining.classList.remove('expired')

    if (timerInterval) clearInterval(timerInterval)
    timerInterval = setInterval(() => {
      const remaining = timerEnd - Date.now()
      if (remaining <= 0) {
        timerRemaining.textContent = '0:00'
        timerRemaining.classList.add('expired')
        clearInterval(timerInterval)
        timerInterval = null
        return
      }
      const min = Math.floor(remaining / 60000)
      const sec = Math.floor((remaining % 60000) / 1000)
      timerRemaining.textContent = min + ':' + String(sec).padStart(2, '0')
    }, 1000)

    requestAnimationFrame(() => window.pinApi.resize(card.offsetHeight))
  })

  // Таймер истёк — мигание + звук
  window.pinApi.onTimerAlert(() => {
    card.classList.add('timer-alert')
    playTimerSound()
    // Убрать мигание через 10 сек
    setTimeout(() => card.classList.remove('timer-alert'), 10000)
  })

  function stopLocalTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null }
    timerCountdown.classList.remove('active')
    timerButtons.style.display = ''
    timerRemaining.classList.remove('expired')
    card.classList.remove('timer-alert')
    requestAnimationFrame(() => window.pinApi.resize(card.offsetHeight))
  }

  // v0.70.0: категории
  const categorySection = document.getElementById('categorySection')
  let currentCategory = ''
  categorySection.addEventListener('click', (e) => {
    const btn = e.target.closest('.cat-btn')
    if (!btn) return
    const cat = btn.dataset.cat
    // Toggle: если уже выбрана — снять
    if (currentCategory === cat) {
      currentCategory = ''
      categorySection.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'))
    } else {
      currentCategory = cat
      categorySection.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
    }
    window.pinApi.setCategory(currentCategory)
    requestAnimationFrame(() => window.pinApi.resize(card.offsetHeight))
  })

  // v0.72.0: Обновление заметки из dock контекстного меню
  window.pinApi.onNoteUpdated((text) => {
    currentNote = text || ''
    if (currentNote) {
      noteDisplay.textContent = currentNote
      noteDisplay.classList.add('visible')
      noteToggle.classList.add('has-note')
    } else {
      noteDisplay.classList.remove('visible')
      noteToggle.classList.remove('has-note')
    }
    requestAnimationFrame(() => window.pinApi.resize(card.offsetHeight))
  })

  // v0.71.0: Обновление категории из dock контекстного меню
  window.pinApi.onCategoryUpdated((cat) => {
    currentCategory = cat
    categorySection.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.cat === cat)
    })
  })

  // Звук напоминания — два коротких бипа
  function playTimerSound() {
    try {
      const ctx = new AudioContext()
      for (let i = 0; i < 2; i++) {
        const osc = ctx.createOscillator()
        const gain = ctx.createGain()
        osc.connect(gain)
        gain.connect(ctx.destination)
        osc.frequency.value = 880
        gain.gain.value = 0.25
        osc.start(ctx.currentTime + i * 0.3)
        osc.stop(ctx.currentTime + i * 0.3 + 0.12)
      }
      setTimeout(() => ctx.close(), 1000)
    } catch {}
  }
</script>
</body>
</html>
